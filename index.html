<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DX Div. Resource</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
<style>
:root{
  --bg:#F4F6FA;--bg-sub:#FFFFFF;--bg-card:#FFFFFF;--bg-sub2:#F0F3F9;--bg-input:#EEF1F8;
  --bd:rgba(0,0,0,0.08);--bd-md:rgba(0,0,0,0.13);
  --primary:#2563EB;--primary-h:#1D4ED8;--primary-lt:rgba(37,99,235,0.09);--primary-bd:rgba(37,99,235,0.22);
  --success:#00A876;--success-lt:rgba(0,168,118,0.09);--success-bd:rgba(0,168,118,0.22);
  --warning:#D97706;--warning-lt:rgba(217,119,6,0.09);--warning-bd:rgba(217,119,6,0.22);
  --danger:#DC2626;--danger-lt:rgba(220,38,38,0.09);--danger-bd:rgba(220,38,38,0.22);
  --t1:#0F172A;--t2:rgba(15,23,42,0.62);--t3:rgba(15,23,42,0.38);--t4:rgba(15,23,42,0.20);
  --shadow:0 1px 8px rgba(0,0,0,0.07);--r-sm:7px;--r-md:10px;--r-lg:14px;
}
[data-theme="dark"]{
  --bg:#0C1220;--bg-sub:#111928;--bg-card:#18243A;--bg-sub2:#1E2D47;--bg-input:#1A2540;
  --bd:rgba(255,255,255,0.07);--bd-md:rgba(255,255,255,0.13);
  --primary:#3D7BFF;--primary-h:#2D6BEF;--primary-lt:rgba(61,123,255,0.13);--primary-bd:rgba(61,123,255,0.26);
  --success:#00C48C;--success-lt:rgba(0,196,140,0.11);--success-bd:rgba(0,196,140,0.24);
  --warning:#FFA940;--warning-lt:rgba(255,169,64,0.11);--warning-bd:rgba(255,169,64,0.24);
  --danger:#FF4D4F;--danger-lt:rgba(255,77,79,0.11);--danger-bd:rgba(255,77,79,0.24);
  --t1:#F0F4FF;--t2:rgba(240,244,255,0.65);--t3:rgba(240,244,255,0.38);--t4:rgba(240,244,255,0.20);
  --shadow:0 2px 14px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t1);font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}
input,select,textarea,button{font-family:inherit;font-size:13px;}
::placeholder{color:var(--t4);}
.card{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--r-lg);box-shadow:var(--shadow);}
.inp{background:var(--bg-input);border:1px solid var(--bd-md);border-radius:var(--r-sm);padding:8px 12px;color:var(--t1);outline:none;width:100%;transition:border-color .2s;}
.inp:focus{border-color:var(--primary);}
select.inp{cursor:pointer;}
select.inp option{background:var(--bg-card);color:var(--t1);}
select.inp:disabled{opacity:.4;cursor:not-allowed;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn-p{background:var(--primary);color:#fff;}.btn-p:hover{background:var(--primary-h);}.btn-p:disabled{opacity:.4;cursor:not-allowed;}
.btn-g{background:var(--bg-sub2);color:var(--t2);border:1px solid var(--bd-md);}.btn-g:hover{background:var(--bg-input);}
.btn-d{background:var(--danger-lt);color:var(--danger);border:1px solid var(--danger-bd);}.btn-d:hover{opacity:.8;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-lg{padding:11px 24px;font-size:14px;border-radius:var(--r-md);}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.bdg-p{background:var(--primary-lt);color:var(--primary);border:1px solid var(--primary-bd);}
.bdg-s{background:var(--success-lt);color:var(--success);border:1px solid var(--success-bd);}
.bdg-w{background:var(--warning-lt);color:var(--warning);border:1px solid var(--warning-bd);}
.bdg-d{background:var(--danger-lt);color:var(--danger);border:1px solid var(--danger-bd);}
.bdg-dim{background:var(--bd);color:var(--t3);border:1px solid var(--bd-md);}
.progress{background:var(--bd-md);border-radius:99px;height:5px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:var(--primary);}
.alert{padding:10px 14px;border-radius:var(--r-sm);font-size:12px;display:flex;align-items:flex-start;gap:8px;}
.alert-w{background:var(--warning-lt);border:1px solid var(--warning-bd);color:var(--warning);}
.alert-i{background:var(--primary-lt);border:1px solid var(--primary-bd);color:var(--primary);}
.alert-s{background:var(--success-lt);border:1px solid var(--success-bd);color:var(--success);}
.alert-d{background:var(--danger-lt);border:1px solid var(--danger-bd);color:var(--danger);}
.tabs{display:flex;border-bottom:1px solid var(--bd);overflow-x:auto;margin-bottom:20px;}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--t3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;margin-bottom:-1px;transition:all .15s;}
.tab:hover{color:var(--t2);}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}
.tab-a{padding:10px 18px;font-size:13px;color:var(--t3);text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-block;}
.tab-a:hover{color:var(--t2);}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 14px;font-size:11px;font-weight:600;color:var(--t3);text-align:left;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.05em;background:var(--bg-sub2);white-space:nowrap;}
.tbl td{padding:10px 14px;font-size:13px;color:var(--t2);border-bottom:1px solid var(--bd);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--bg-input);}
.lbl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px;}
nav{background:var(--bg-sub);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:40;box-shadow:var(--shadow);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.pop{animation:fadeIn .18s ease;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--bd-md);border-radius:99px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const GAS="https://script.google.com/macros/s/AKfycbx3hb69nTuRt-VVRtOlCyy6dw-YeOIG4brN_ziwjeeVBgcPFRA6QLNXDzoPLPvJJZ7a/exec";
const SHEET_LINK="https://docs.google.com/spreadsheets/d/1C597_LE-jvm7fs8phNwX7-tY1a9dE8NbmOpGPuOXCPw/edit?usp=sharing";
const PIN="9943";

const INIT_MEMBERS=[
  {id:1,name:"김지훈",team:"DX본부",rank:"본부장"},
  {id:2,name:"신민정",team:"기획",rank:"팀장"},
  {id:3,name:"이예주",team:"기획",rank:"책임"},
  {id:4,name:"김지홍",team:"기획",rank:"선임"},
  {id:5,name:"권가윤",team:"PM",rank:"팀장"},
  {id:6,name:"신민섭",team:"PM",rank:"책임"},
  {id:7,name:"최상욱",team:"PM",rank:"매니저"},
  {id:8,name:"김민태",team:"시스템",rank:"매니저"},
  {id:9,name:"김영민",team:"디자인",rank:"팀장"},
  {id:10,name:"김정민",team:"디자인",rank:"선임"},
  {id:11,name:"박상언",team:"디자인",rank:"매니저"},
];
const INIT_PROJECTS=[
  {id:1,type:"상용",code:"DS25R018",name:"별내 아르떼키즈파크 구축"},
  {id:2,type:"비상용",code:"DS26N004",name:"내부활동-LG"},
  {id:3,type:"비상용",code:"DS26N004",name:"내부활동-신정호키즈랜드"},
  {id:4,type:"비상용",code:"DS26N004",name:"내부활동-신세계스퀘어"},
  {id:5,type:"비상용",code:"DS26N004",name:"내부활동-더파크사이드"},
  {id:6,type:"비상용",code:"DS26N004",name:"내부활동-고성공룡"},
  {id:7,type:"비상용",code:"DS26N004",name:"내부활동-DX본부"},
  {id:8,type:"상용",code:"DS250001",name:"롯데월드 부산 로리캐슬 운영"},
  {id:9,type:"비상용",code:"DS26N004",name:"내부활동-AI R&D"},
];

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const S={
  page:"main", tab:"resource", dark:false,
  authed:false, pinVal:"", pinErr:false,
  members:[...INIT_MEMBERS], projects:[...INIT_PROJECTS], resources:[],
  connected:false, menuOpen:false,
  syncing:false, syncMsg:"",
  wS:"", wE:"", team:"", entries:{}, note:"",
  mForm:{name:"",team:"",rank:""}, mEdit:null,
  pForm:{type:"상용",code:"",name:""}, pEdit:null,
  analysis:"", analyzing:false,
  toast:false, warnList:null,
};

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
const LS={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const fmt=s=>{if(!s)return"";const[y,m,d]=s.split("-");return`${y}.${m}.${d}`;};
const getFriday=s=>{const d=new Date(s);d.setDate(d.getDate()+(5-d.getDay()+7)%7);return d.toISOString().split("T")[0];};
const nid=arr=>arr.length?Math.max(...arr.map(x=>x.id))+1:1;
const gname=pid=>{const p=S.projects.find(x=>x.id===Number(pid));return p?p.name:`#${pid}`;};
const totFor=mid=>(S.entries[mid]||[]).reduce((s,a)=>s+(Number(a.rate)||0),0);
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

/* 프로젝트 정렬: 상용-역순 / 비상용-#7고정+역순 */
const sortedProjects=type=>{
  const l=S.projects.filter(p=>p.type===type);
  if(type==="비상용") return [...l.filter(p=>p.id===7),...l.filter(p=>p.id!==7).sort((a,b)=>b.id-a.id)];
  return [...l].sort((a,b)=>b.id-a.id);
};

/* ═══════════════════════════════════════
   GAS
═══════════════════════════════════════ */
function gasCall(params){
  return new Promise(resolve=>{
    const cb="gcb_"+Date.now()+"_"+Math.random().toString(36).slice(2);
    const s=document.createElement("script");
    const timer=setTimeout(()=>{delete window[cb];s.remove();resolve({ok:false,error:"timeout"});},12000);
    window[cb]=data=>{clearTimeout(timer);delete window[cb];s.remove();resolve(data);};
    const q=Object.entries({...params,callback:cb}).map(([k,v])=>encodeURIComponent(k)+"="+encodeURIComponent(typeof v==="object"?JSON.stringify(v):v)).join("&");
    s.src=GAS+"?"+q;
    s.onerror=()=>{clearTimeout(timer);delete window[cb];s.remove();resolve({ok:false,error:"script error"});};
    document.head.appendChild(s);
  });
}
const gasGet=action=>gasCall({action});
const gasPost=payload=>{
  const {action,...rest}=payload;
  if(action==="saveConfig") return gasCall({action,key:rest.key,value:JSON.stringify(rest.data)});
  if(action==="saveResource") return gasCall({action,resource:rest.data,members:rest.members,projects:rest.projects});
  return Promise.resolve({ok:false});
};

async function loadData(){
  const lsM=LS.get("dx-m");if(lsM){S.members=lsM;}
  const lsP=LS.get("dx-p");if(lsP){S.projects=lsP;}
  const lsR=LS.get("dx-r");if(lsR){S.resources=lsR;}
  render();
  try{
    const [cfg,res]=await Promise.all([gasGet("getConfig"),gasGet("getResources")]);
    if(cfg.ok&&cfg.data){
      if(cfg.data.members){S.members=cfg.data.members;LS.set("dx-m",cfg.data.members);}
      if(cfg.data.projects){S.projects=cfg.data.projects;LS.set("dx-p",cfg.data.projects);}
      S.connected=true;
    }
    if(res.ok&&res.data&&res.data.length){S.resources=res.data;LS.set("dx-r",res.data);}
  }catch(e){console.warn("GAS:",e);}
  render();
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function render(){
  document.documentElement.setAttribute("data-theme",S.dark?"dark":"");
  const body=S.page==="main"?renderMain():renderInput();
  document.getElementById("app").innerHTML=renderNav()+`<div style="max-width:1080px;margin:0 auto;padding:20px">${body}</div>`+renderToast()+renderWarnModal();
  bindEvents();
}

/* ── Nav ── */
function renderNav(){
  return`<nav>
    <div style="max-width:1080px;margin:0 auto;padding:0 20px">
      <div style="display:flex;align-items:center;justify-content:space-between;height:52px">
        <span style="font-weight:800;font-size:14px;letter-spacing:-.02em;color:var(--t1)">
          <span style="color:var(--primary)">DX</span>
          <span style="font-weight:400;color:var(--t3);margin:0 5px">/</span>
          <span style="font-weight:500;font-size:13px">Resource</span>
        </span>
        <div id="nav-d" style="display:flex;align-items:center;gap:8px">
          ${S.connected?`<span style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--success);background:var(--success-lt);border:1px solid var(--success-bd);border-radius:99px;padding:4px 10px;white-space:nowrap"><span class="dot" style="background:var(--success)"></span>구글시트연동</span>`:""}
          <button class="btn btn-g" style="font-size:11px;padding:5px 10px" onclick="doSync()" ${S.syncing?"disabled":""}>
            ${S.syncing?'<span class="spin">⟳</span> 동기화 중...':"🔄 동기화"}
          </button>
          <button class="btn btn-g" style="font-size:11px;padding:5px 12px;border-radius:99px" onclick="toggleTheme()">
            ${S.dark?"☀️ 라이트":"🌙 다크"}
          </button>
          <div style="display:flex;gap:2px">
            <button class="btn" style="padding:6px 14px;font-size:13px;font-weight:500;background:${S.page==="main"?"var(--primary)":"transparent"};color:${S.page==="main"?"#fff":"var(--t3)"}" onclick="setPage('main')">📊 투입현황</button>
            <button class="btn" style="padding:6px 14px;font-size:13px;font-weight:500;background:${S.page==="input"?"var(--primary)":"transparent"};color:${S.page==="input"?"#fff":"var(--t3)"}" onclick="setPage('input')">🛠️ 리소스 및 정보 입력</button>
          </div>
        </div>
        <button id="nav-m" style="background:none;border:none;cursor:pointer;color:var(--t2);font-size:20px;display:none" onclick="toggleMenu()">${S.menuOpen?"✕":"☰"}</button>
      </div>
      ${S.syncMsg?`<div style="background:var(--success-lt);text-align:center;font-size:12px;padding:5px;color:var(--success);border-top:1px solid var(--success-bd)">${S.syncMsg}</div>`:""}
    </div>
    ${S.menuOpen?`<div style="border-top:1px solid var(--bd);background:var(--bg-sub)">
      <button class="tab ${S.page==="main"?"on":""}" onclick="setPage('main');toggleMenu()">📊 투입현황</button>
      <button class="tab ${S.page==="input"?"on":""}" onclick="setPage('input');toggleMenu()">🛠️ 리소스 및 정보 입력</button>
      <button class="tab" onclick="doSync();toggleMenu()">🔄 데이터 동기화</button>
      <button class="tab" onclick="toggleTheme();toggleMenu()">${S.dark?"☀️ 라이트 모드":"🌙 다크 모드"}</button>
    </div>`:""}
    <style>@media(max-width:767px){#nav-d{display:none!important;}#nav-m{display:block!important;}}</style>
  </nav>`;
}

/* ── Main Page ── */
function renderMain(){
  const sorted=[...S.resources].sort((a,b)=>b.weekStart.localeCompare(a.weekStart));
  const latest=sorted[0];
  if(!latest)return`<div style="text-align:center;padding:80px 16px;color:var(--t3)">
    <div style="font-size:48px;margin-bottom:14px">📋</div>
    <p style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:6px">입력된 데이터가 없습니다.</p>
    <p style="font-size:12px">리소스 및 정보 입력 메뉴에서 데이터를 입력해주세요.</p>
  </div>`;

  const notes=latest.teamNotes?Object.entries(latest.teamNotes).filter(([,n])=>n&&n.trim()):[];

  /* 모바일 카드 */
  const mobileCards=S.members.map(m=>{
    const e=latest.entries.find(x=>x.memberId===m.id);
    const al=(e?.allocations||[]).filter(a=>a.rate>0).sort((a,b)=>Number(b.rate)-Number(a.rate));
    const tot=al.reduce((s,a)=>s+Number(a.rate),0);
    const bc=tot===100?"bdg-p":tot>100?"bdg-d":tot>0?"bdg-w":"bdg-dim";
    const bord=tot===100?"var(--success-bd)":tot>100?"var(--danger-bd)":tot>0?"var(--warning-bd)":"var(--bd)";
    const bars=al.length===0?`<span style="font-size:12px;color:var(--t4)">배정 내역 없음</span>`
      :al.map((a,i)=>`<div style="margin-bottom:${i<al.length-1?7:0}px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80%">${esc(gname(a.projectId))}</span>
          <span style="font-size:12px;font-weight:700;color:var(--primary);margin-left:8px;flex-shrink:0">${a.rate}%</span>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${Math.min(Number(a.rate),100)}%"></div></div>
      </div>`).join("");
    return`<div class="card" style="padding:12px 14px;margin-bottom:8px;border-left:3px solid ${bord}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-weight:700;font-size:14px;color:var(--t1)">${esc(m.name)}</span>
          <span style="font-size:11px;color:var(--t3)">${esc(m.team)} · ${esc(m.rank)}</span>
        </div>
        <span class="badge ${bc}">${tot}%</span>
      </div>${bars}</div>`;
  }).join("");

  /* 데스크탑 행 */
  const dtRows=S.members.map(m=>{
    const e=latest.entries.find(x=>x.memberId===m.id);
    const al=(e?.allocations||[]).filter(a=>a.rate>0).sort((a,b)=>Number(b.rate)-Number(a.rate));
    const tot=al.reduce((s,a)=>s+Number(a.rate),0);
    const bc=tot===100?"bdg-p":tot>100?"bdg-d":tot>0?"bdg-w":"bdg-dim";
    const bars=al.length===0?`<span style="font-size:12px;color:var(--t4)">배정 내역 없음</span>`
      :al.map((a,i)=>`<div style="margin-bottom:${i<al.length-1?9:0}px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68%">${esc(gname(a.projectId))}</span>
          <span style="font-size:11px;font-weight:700;color:var(--primary);margin-left:4px">${a.rate}%</span>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${Math.min(Number(a.rate),100)}%"></div></div>
      </div>`).join("");
    return`<tr>
      <td><span style="font-weight:700;color:var(--t1)">${esc(m.name)}</span></td>
      <td>${esc(m.team)}</td><td style="color:var(--t3);font-size:12px">${esc(m.rank)}</td>
      <td>${bars}</td>
      <td style="text-align:right"><span class="badge ${bc}">${tot}%</span></td>
    </tr>`;
  }).join("");

/* ── Resource Tab ── */
function renderResourceTab(){
  const teams=[...new Set(S.members.map(m=>m.team))];

  const teamMembers=S.members.filter(m=>m.team===S.team);

  const memberCards=S.team?teamMembers.map(m=>{
    const rows=S.entries[m.id]||[];

    const ok=t===100,ov=t>100,un=t>0&&t<100;
    const bord=ok?"var(--success-bd)":ov?"var(--danger-bd)":un?"var(--warning-bd)":"var(--bd)";
    const badge=ok?`<span class="badge bdg-s">✓ 정상</span>`:ov?`<span class="badge bdg-d">초과</span>`:un?`<span class="badge bdg-w">미달</span>`:"";

    const rowsHTML=rows.map((row,i)=>`
      <div style="margin-bottom:8px">
        <select class="inp" style="margin-bottom:6px" onchange="updEntry(${m.id},${i},'projectId',this.value)">
          <option value="">프로젝트 선택</option>

          <optgroup label="── 비상용">${pOptsBi.replace(/selected/g,"").replace(new RegExp(`value="${row.projectId}"`),`value="${row.projectId}" selected`)}</optgroup>

          <input type="number" class="inp" style="flex:1;text-align:center;font-size:15px;font-weight:600"

          <button class="btn btn-d" style="padding:6px 10px;font-size:14px" onclick="delRow(${m.id},${i})">×</button>

          <select class="inp" ${!S.wS?"disabled":""} onchange="onTeamChange(this.value)">
            <option value="">팀 선택</option>
            ${teams.map(t=>`<option value="${t}" ${S.team===t?"selected":""}>${t}</option>`).join("")}
          </select>
        </div>
      </div>
      ${S.wS?`<div class="alert ${isOW?"alert-w":"alert-i"}" style="margin-top:12px">
        <span>${isOW?"✏️":"🆕"}</span>
        <span>${isOW?"이미 입력된 주차입니다. 저장 시 해당 주차 전체 데이터를 덮어씁니다.":"신규 주차입니다. 저장 시 구글 시트에 새로 추가됩니다."}</span>

/* ═══════════════════════════════════════
   ACTIONS
═══════════════════════════════════════ */
function setPage(p){S.page=p;S.menuOpen=false;render();}
function setTab(t){S.tab=t;render();}
function toggleTheme(){S.dark=!S.dark;render();}
function toggleMenu(){S.menuOpen=!S.menuOpen;render();}
function doLogout(){S.authed=false;render();}
function hideToast(){S.toast=false;render();}

function doLogin(){
  const v=document.getElementById("pin-inp")?.value||S.pinVal;
  if(v===PIN){S.authed=true;S.pinErr=false;S.pinVal="";}
  else{S.pinErr=true;S.pinVal="";}
  render();
}

function onDateChange(v){
  S.wS=v;S.wE=v?getFriday(v):"";S.team="";S.entries={};S.note="";render();
}
function onTeamChange(t){
  S.team=t;
  const ex=S.resources.find(r=>r.weekStart===S.wS);
  const init={};
  S.members.filter(m=>m.team===t).forEach(m=>{
    const e=ex?.entries?.find(x=>x.memberId===m.id);
    init[m.id]=e?.allocations?.length?e.allocations.map(a=>({...a})):[{projectId:"",rate:""}];
  });
  S.entries=init;S.note=ex?.teamNotes?.[t]||"";render();
}
function addRow(mid){
  if(!S.entries[mid])S.entries[mid]=[];
  S.entries[mid].push({projectId:"",rate:""});render();
}
function delRow(mid,i){
  S.entries[mid]=S.entries[mid].filter((_,j)=>j!==i);render();
}
function updEntry(mid,i,f,v){
  if(!S.entries[mid])return;
  S.entries[mid][i][f]=v;
  /* 합계만 리렌더 (전체 리렌더 방지) */
  const t=totFor(mid);
  const card=document.querySelectorAll(".card[data-mid='"+mid+"']")[0];
  if(!card)return;
  const sumEl=card.querySelector(".sum-label");
  if(sumEl){
    const ok=t===100,ov=t>100;
    sumEl.textContent="합계 "+t+"%";
    sumEl.style.color=ok?"var(--success)":ov?"var(--danger)":"var(--warning)";
  }
}

function saveResource(){
  if(!S.wS)return alert("시작일을 선택해주세요.");
  if(!S.team)return alert("팀을 선택해주세요.");
  const teamM=S.members.filter(m=>m.team===S.team);
  const warn=teamM.filter(m=>totFor(m.id)!==100).map(m=>({memberId:m.id,name:m.name,total:totFor(m.id)}));
  if(warn.length){S.warnList=warn;render();return;}
  doSaveResource();
}
async function doSaveResource(){
  const teamM=S.members.filter(m=>m.team===S.team);
  const tIds=teamM.map(m=>m.id);
  const newE=teamM.map(m=>({
    memberId:m.id,
    allocations:(S.entries[m.id]||[]).filter(a=>a.projectId!==""&&a.rate!=="").map(a=>({...a,projectId:Number(a.projectId)}))
  }));
  const ex=S.resources.find(r=>r.weekStart===S.wS);
  let res;
  if(ex){const tn={...ex.teamNotes||{}};tn[S.team]=S.note;res={...ex,entries:[...ex.entries.filter(e=>!tIds.includes(e.memberId)),...newE],teamNotes:tn};}
  else{const tn={};tn[S.team]=S.note;res={weekStart:S.wS,weekEnd:S.wE,entries:newE,teamNotes:tn};}
  S.resources=S.resources.find(r=>r.weekStart===S.wS)?S.resources.map(r=>r.weekStart===S.wS?res:r):[...S.resources,res];
  LS.set("dx-r",S.resources);
  S.warnList=null;S.toast=true;render();
  setTimeout(()=>{S.toast=false;render();},2200);
  try{await gasPost({action:"saveResource",data:res,members:S.members,projects:S.projects});}catch(e){}
}

function saveMember(){
  const f=S.mForm;
  if(!f.name||!f.team||!f.rank)return alert("모든 필드를 입력해주세요.");

async function doSync(){
  S.syncing=true;S.syncMsg="";render();
  try{
    const clean=await gasGet("cleanupSheets");
    await loadData();
    S.syncMsg=clean.cleaned>0?`✅ 동기화 완료 (중복 ${clean.cleaned}건 정리됨)`:"✅ 동기화 완료";
  }catch(e){S.syncMsg="⚠️ 동기화 실패";}
  S.syncing=false;render();
  setTimeout(()=>{S.syncMsg="";render();},4000);
}

function runAnalysis(){
  const sorted=[...S.resources].sort((a,b)=>b.weekStart.localeCompare(a.weekStart));
  const latest=sorted[0],prev=sorted[1];
  if(!latest)return;
  S.analyzing=true;S.analysis="";render();
  setTimeout(()=>{
    const N=S.members.length;
    const getT=m=>{const e=latest.entries.find(x=>x.memberId===m.id);return(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);};
    const over=S.members.filter(m=>getT(m)>100);
    const under=S.members.filter(m=>getT(m)>0&&getT(m)<100);
    const none=S.members.filter(m=>getT(m)===0);
    const full=S.members.filter(m=>getT(m)===100).length;
    const notes=latest.teamNotes?Object.entries(latest.teamNotes).filter(([,n])=>n&&n.trim()):[];
    const lines=[];
    lines.push(`【 ${fmt(latest.weekStart)} ~ ${fmt(latest.weekEnd)} 주간 분석 】\n`);
    lines.push(`① 이번 주 요약`);
    lines.push(`   전체 ${N}명 / 정상(100%) ${full}명 / 초과 ${over.length}명 / 미달 ${under.length}명`);
    if(none.length)lines.push(`   미입력: ${none.map(m=>m.name).join(", ")}`);
    lines.push(`\n② 지난 주 대비 변경`);
    if(!prev){lines.push("   첫 입력 데이터 — 비교 없음");}
    else{
      let cnt=0,details=[];
      S.members.forEach(m=>{
        const ce=latest.entries.find(x=>x.memberId===m.id);
        const pe=prev.entries.find(x=>x.memberId===m.id);
        const cs=(ce?.allocations||[]).map(a=>`${gname(a.projectId)}:${a.rate}`).sort().join("|");
        const ps=(pe?.allocations||[]).map(a=>`${gname(a.projectId)}:${a.rate}`).sort().join("|");
        if(cs!==ps){cnt++;const ct=(ce?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);const pt=(pe?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);details.push(`   • ${m.name}(${m.team}): ${pt}% → ${ct}%`);}
      });
      if(cnt===0)lines.push("   변경 없음");
      else{lines.push(`   총 ${cnt}명 변경`);details.forEach(d=>lines.push(d));}
    }
    lines.push(`\n③ 주의 인원`);
    if(!over.length&&!under.length)lines.push("   전원 정상 ✅");
    else{over.forEach(m=>lines.push(`   ▲ 초과: ${m.name}(${m.team}) ${getT(m)}%`));under.forEach(m=>lines.push(`   ▼ 미달: ${m.name}(${m.team}) ${getT(m)}%`));}
    if(notes.length){lines.push(`\n④ 특이사항`);notes.forEach(([t,n])=>lines.push(`   [${t}] ${n}`));}
    const pm={};
    latest.entries.forEach(e=>(e.allocations||[]).forEach(a=>{if(!a.projectId||!a.rate)return;const n=gname(a.projectId);pm[n]=(pm[n]||0)+Number(a.rate);}));
    lines.push(`\n⑤ 프로젝트별 현황`);
    Object.entries(pm).sort((a,b)=>b[1]-a[1]).forEach(([n,t])=>lines.push(`   • ${n}: 총 ${t}% (평균 ${(t/N).toFixed(1)}%)`));
    S.analysis=lines.join("\n");S.analyzing=false;render();
  },400);
}

function printReport(){
  const sorted=[...S.resources].sort((a,b)=>b.weekStart.localeCompare(a.weekStart));
  const latest=sorted[0];if(!latest)return;
  const today=new Date();
  const mmdd=String(today.getMonth()+1).padStart(2,"0")+String(today.getDate()).padStart(2,"0");
  const notes=latest.teamNotes?Object.entries(latest.teamNotes).filter(([,n])=>n&&n.trim()):[];
  const rows=S.members.map(m=>{
    const e=latest.entries.find(x=>x.memberId===m.id);
    const al=(e?.allocations||[]).filter(a=>a.rate>0).sort((a,b)=>Number(b.rate)-Number(a.rate));
    const tot=al.reduce((s,a)=>s+Number(a.rate),0);
    const bc=tot===100?"#2563EB":tot>100?"#DC2626":"#D97706";
    const bb=tot===100?"#EFF6FF":tot>100?"#FEF2F2":"#FFFBEB";
    const cell=al.length===0?`<span style="color:#ccc;font-size:9px">배정 내역 없음</span>`
      :al.map(a=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span style="font-size:9px;min-width:100px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${gname(a.projectId)}</span>
        <table cellpadding="0" cellspacing="0" style="flex:1;border-collapse:collapse"><tr>
          <td style="background:#3b82f6;height:4px;width:${Math.min(Number(a.rate),100)}%;font-size:0"></td>
          <td style="background:#e5e7eb;height:4px;width:${100-Math.min(Number(a.rate),100)}%;font-size:0"></td>
        </tr></table>
        <span style="font-size:9px;font-weight:700;color:#2563EB;min-width:26px;text-align:right">${a.rate}%</span></div>`).join("");
    return`<tr>
      <td style="padding:5px 8px;font-weight:700;font-size:10px;border-bottom:1px solid #f1f5f9">${m.name}</td>
      <td style="padding:5px 8px;font-size:9px;color:#6b7280;border-bottom:1px solid #f1f5f9">${m.team}</td>
      <td style="padding:5px 8px;font-size:9px;color:#9ca3af;border-bottom:1px solid #f1f5f9">${m.rank}</td>
      <td style="padding:5px 8px;border-bottom:1px solid #f1f5f9">${cell}</td>
      <td style="padding:5px 8px;text-align:right;border-bottom:1px solid #f1f5f9">
        <span style="background:${bb};color:${bc};border:1px solid ${bc}33;border-radius:99px;padding:2px 8px;font-size:9px;font-weight:700">${tot}%</span>
      </td></tr>`;
  }).join("");
  const noteHtml=notes.length===0?"":
    `<div style="margin-top:10px;padding:8px 12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px">
      <div style="font-weight:700;font-size:9px;color:#92400E;margin-bottom:6px">📌 팀별 특이사항</div>
      <table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse">
        ${notes.map(([t,n])=>`<tr style="vertical-align:top"><td style="font-weight:700;font-size:9px;color:#1e3a5f;white-space:nowrap;padding:2px 10px 2px 0;width:60px">${t} 팀</td><td style="font-size:9px;color:#374151;padding:2px 0;line-height:1.5">${n.replace(/\n/g,"<br/>")}</td></tr>`).join("")}
      </table></div>`;
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>DX Div. Resource_${mmdd}</title>
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,'Malgun Gothic',sans-serif;padding:8mm}
    h2{font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:2px}.p{font-size:9px;color:#6b7280;margin-bottom:8px}
    table.main{width:100%;border-collapse:collapse}thead tr{background:#1e3a5f}
    thead th{color:#fff;font-size:9px;font-weight:600;padding:5px 8px;text-align:left}
    tbody tr:nth-child(even){background:#f8fafc}
    @media print{@page{margin:0;size:A4 portrait}body{padding:8mm}}</style>
    </head><body>
    <h2>🏢 DX Div. Resource 주간 투입현황</h2>
    <div class="p">📅 ${fmt(latest.weekStart)} ~ ${fmt(latest.weekEnd)} | 출력일: ${today.toLocaleDateString("ko-KR")}</div>
    <table class="main"><thead><tr>
      <th style="width:46px">성명</th><th style="width:42px">팀</th><th style="width:38px">직책</th>
      <th>투입 프로젝트</th><th style="width:42px;text-align:right">투입율</th>
    </tr></thead><tbody>${rows}</tbody></table>${noteHtml}
    <script>window.onload=function(){setTimeout(function(){window.print();},400);};<\/script>
    </body></html>`;
  const w=window.open("","_blank","width=900,height=1100");
  w.document.open();w.document.write(html);w.document.close();
}
