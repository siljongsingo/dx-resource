<script type="text/babel">

/* ── 초기 데이터 ───────────────────────────────────────────── */
const INIT_MEMBERS = [

  { id:2,  type:"비상용", code:"DS26N004", name:"내부활동-LG" },

  { id:5,  type:"비상용", code:"DS26N004", name:"내부활동-더파크사이드" },
  { id:6,  type:"비상용", code:"DS26N004", name:"내부활동-고성공룡" },

  { id:8,  type:"상용",   code:"DS250001", name:"롯데월드 부산 로리캐슬 운영" },

];
const PIN = "9943";

/* ── Firebase 데이터 레이어 ────────────────────────────────── */
const DB = {
  getMembers:  async () => { const d=await db.collection("dx_config").doc("members").get();  return d.exists?d.data().data:null; },
  getProjects: async () => { const d=await db.collection("dx_config").doc("projects").get(); return d.exists?d.data().data:null; },
  getResources:async () => { const s=await db.collection("dx_resources").orderBy("weekStart","desc").get(); return s.docs.map(d=>d.data()); },
  saveMembers: async (data) => db.collection("dx_config").doc("members").set({data}),
  saveProjects:async (data) => db.collection("dx_config").doc("projects").set({data}),
  saveResource:async (res)  => db.collection("dx_resources").doc(res.weekStart).set(res),
};

/* ── 유틸 ──────────────────────────────────────────────────── */
const getFriday=(s)=>{const d=new Date(s);d.setDate(d.getDate()+(5-d.getDay()+7)%7);return d.toISOString().split("T")[0];};
const fmt=(s)=>{if(!s)return"";const[y,m,d]=s.split("-");return`${y}.${m}.${d}`;};
const nid=(arr)=>arr.length?Math.max(...arr.map(x=>x.id))+1:1;

/* ── 공통 컴포넌트 ─────────────────────────────────────────── */
function SuccessPopup({show,onClose}){
  useEffect(()=>{if(show){const t=setTimeout(onClose,2000);return()=>clearTimeout(t);}},[show]);
  if(!show)return null;
  return(
    <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
      <div className="bg-white rounded-2xl shadow-2xl px-10 py-8 flex flex-col items-center gap-3 popup-enter">
        <div className="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center text-3xl">✅</div>
        <p className="text-gray-800 font-bold text-lg">입력이 완료되었습니다.</p>
        <button onClick={onClose} className="text-xs text-gray-400 border border-gray-200 rounded-lg px-4 py-1.5">닫기</button>
      </div>
    </div>
  );
}

function AuthGate({children}){
  const [auth,setAuth]=useState(false);
  const [pin,setPin]=useState(""); const [err,setErr]=useState(false);
  const login=()=>{if(pin===PIN){setAuth(true);setErr(false);}else{setErr(true);setPin("");}};
  if(!auth)return(
    <div className="flex items-center justify-center py-16">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-80">
        <div className="text-center mb-6">
          <div className="text-4xl mb-2">🔐</div>
          <h2 className="font-bold text-gray-800 text-lg">접속 인증</h2>
          <p className="text-sm text-gray-400 mt-1">접속 번호를 입력해주세요</p>
        </div>
        <input type="password" value={pin} onChange={e=>setPin(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&login()} placeholder="· · · ·" maxLength={6}
          className={`w-full border-2 rounded-lg px-4 py-3 text-center text-2xl tracking-[0.5em] mb-2 outline-none ${err?"border-red-400 bg-red-50":"border-gray-200 focus:border-blue-400"}`}/>
        {err&&<p className="text-red-500 text-xs text-center mb-3">접속 번호가 올바르지 않습니다.</p>}
        <button onClick={login} className="w-full bg-blue-800 text-white rounded-lg py-2.5 font-semibold hover:bg-blue-900">접속</button>
      </div>
    </div>
  );
  return children(()=>setAuth(false));
}

/* ── 메인(투입현황) ────────────────────────────────────────── */
function MainPage({members,projects,resources,onReload}){
  const [aiText,setAiText]=useState("");
  const [aiLoading,setAiLoading]=useState(false);

  const sorted=[...resources].sort((a,b)=>b.weekStart.localeCompare(a.weekStart));
  const latest=sorted[0]; const prev=sorted[1];
  const getProj=(pid)=>projects.find(p=>p.id===pid);
  const getShort=(pid)=>{const p=getProj(pid);return p?p.name:`#${pid}`;};
  const getCode=(pid)=>{const p=getProj(pid);return p?p.code:`#${pid}`;};
  const teamsWithNotes=latest?.teamNotes?Object.entries(latest.teamNotes).filter(([,n])=>n?.trim()):[];

  /* 인쇄 */
  const handlePrint=()=>{
    const rows=members.map(m=>{
      const entry=latest.entries.find(e=>e.memberId===m.id);
      const allocs=(entry?.allocations||[]).filter(a=>a.rate>0).sort((a,b)=>Number(b.rate)-Number(a.rate));
      const total=allocs.reduce((s,a)=>s+Number(a.rate),0);
      const bc=total===100?"#1d4ed8":total>100?"#dc2626":"#ea580c";
      const bb=total===100?"#eff6ff":total>100?"#fef2f2":"#fff7ed";
      const cell=allocs.length===0?`<span style="color:#d1d5db;font-size:9px;">배정 내역 없음</span>`
        :allocs.map(a=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
          <span style="font-size:9px;color:#374151;min-width:110px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${getShort(a.projectId)}</span>
          <div style="flex:1;background:#e5e7eb;border-radius:99px;height:5px;"><div style="background:#3b82f6;height:5px;border-radius:99px;width:${Math.min(Number(a.rate),100)}%;"></div></div>
          <span style="font-size:9px;font-weight:700;color:#2563eb;min-width:28px;text-align:right;">${a.rate}%</span>
          </div>`).join("");
      return`<tr><td style="padding:5px 8px;font-weight:700;font-size:10px;white-space:nowrap;border-bottom:1px solid #f1f5f9;">${m.name}</td>
        <td style="padding:5px 8px;font-size:9px;color:#6b7280;border-bottom:1px solid #f1f5f9;">${m.team}</td>
        <td style="padding:5px 8px;font-size:9px;color:#9ca3af;border-bottom:1px solid #f1f5f9;">${m.rank}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #f1f5f9;">${cell}</td>
        <td style="padding:5px 8px;text-align:right;border-bottom:1px solid #f1f5f9;">
          <span style="background:${bb};color:${bc};border:1px solid ${bc}33;border-radius:99px;padding:2px 8px;font-size:9px;font-weight:700;">${total}%</span></td></tr>`;
    }).join("");
    const notes=teamsWithNotes.length>0?`<div style="margin-top:10px;padding:8px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;">
      <div style="font-weight:700;font-size:9px;color:#92400e;margin-bottom:6px;">📌 팀별 특이사항</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">${teamsWithNotes.map(([t,n])=>`<div><span style="font-weight:600;font-size:9px;color:#1e3a5f;">${t} 팀</span><div style="font-size:9px;color:#374151;margin-top:1px;">${n}</div></div>`).join("")}</div></div>`:"";
    const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>DX Div. Resource</title>
      <style>*{box-sizing:border-box;margin:0;padding:0;}html,body{width:210mm;}
      body{font-family:-apple-system,'Malgun Gothic',sans-serif;padding:10mm;background:#fff;}
      h2{font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:2px;}
      .period{font-size:9px;color:#6b7280;margin-bottom:8px;}
      table{width:100%;border-collapse:collapse;}
      thead tr{background:#1e3a5f;}
      thead th{color:#fff;font-size:9px;font-weight:600;padding:5px 8px;text-align:left;}
      thead th:last-child{text-align:right;}
      tbody tr:nth-child(even){background:#f8fafc;}
      @media print{@page{margin:0;size:A4 portrait;}body{padding:10mm;}}</style>
      </head><body>
      <h2>🏢 DX Div. Resource &nbsp;주간 투입현황</h2>
      <div class="period">📅 ${fmt(latest.weekStart)} ~ ${fmt(latest.weekEnd)}&nbsp;&nbsp;|&nbsp;&nbsp;출력일: ${new Date().toLocaleDateString('ko-KR')}</div>
      <table><thead><tr><th style="width:48px;">성명</th><th style="width:44px;">팀</th><th style="width:40px;">직책</th><th>투입 프로젝트 (투입률 높은 순)</th><th style="width:44px;">투입율</th></tr></thead>
      <tbody>${rows}</tbody></table>${notes}
      <script>setTimeout(()=>{window.print();},400);<\/script></body></html>`;
    const w=window.open("","_blank","width=900,height=1100");
    w.document.open();w.document.write(html);w.document.close();
  };

  /* 엑셀 내보내기 */
  const handleExport=()=>{
    if(!expStart||!expEnd)return alert("기간을 선택해주세요.");
    setExporting(true);
    const filtered=resources.filter(r=>r.weekStart>=expStart&&r.weekStart<=expEnd)
      .sort((a,b)=>a.weekStart.localeCompare(b.weekStart));
    if(filtered.length===0){setExporting(false);return alert("해당 기간에 데이터가 없습니다.");}

    const rows=[];
    filtered.forEach(r=>{
      members.forEach(m=>{
        const entry=r.entries.find(e=>e.memberId===m.id);
        const allocs=entry?.allocations?.filter(a=>a.projectId!==""&&a.rate!=="");
        if(allocs&&allocs.length>0){
          allocs.forEach(a=>{
            const p=projects.find(x=>x.id===a.projectId);
            rows.push({
              "주차 시작": fmt(r.weekStart),
              "주차 종료": fmt(r.weekEnd),
              "성명": m.name,
              "팀": m.team,
              "직책": m.rank,
              "구분": p?.type||"",
              "프로젝트 코드": p?.code||"",
              "프로젝트명": p?.name||"",
              "투입율(%)": Number(a.rate),
            });
          });
        } else {
          rows.push({
            "주차 시작": fmt(r.weekStart),
            "주차 종료": fmt(r.weekEnd),
            "성명": m.name,
            "팀": m.team,
            "직책": m.rank,
            "구분": "","프로젝트 코드": "","프로젝트명": "배정없음","투입율(%)": 0,
          });
        }
      });
      // 팀별 특이사항 시트용
    });

    // 특이사항 시트
    const noteRows=[];
    filtered.forEach(r=>{
      if(r.teamNotes){
        Object.entries(r.teamNotes).filter(([,n])=>n?.trim()).forEach(([team,note])=>{
          noteRows.push({"주차 시작":fmt(r.weekStart),"주차 종료":fmt(r.weekEnd),"팀":team,"특이사항":note});
        });
      }
    });

    const wb=XLSX.utils.book_new();
    const ws1=XLSX.utils.json_to_sheet(rows);
    ws1["!cols"]=[{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:8},{wch:14},{wch:24},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws1,"투입현황");
    if(noteRows.length>0){
      const ws2=XLSX.utils.json_to_sheet(noteRows);
      ws2["!cols"]=[{wch:12},{wch:12},{wch:10},{wch:40}];
      XLSX.utils.book_append_sheet(wb,ws2,"특이사항");
    }
    XLSX.writeFile(wb,`DX_Resource_${expStart}_${expEnd}.xlsx`);
    setExporting(false);
  };

  /* 자체 분석 엔진 */
  const runAi=()=>{
    if(!latest)return;
    setAiLoading(true);setAiText("");
    setTimeout(()=>{
      const lines=[];

      // ① 이번 주 전체 요약
      const totalMembers=members.length;
      const inputMembers=latest.entries.filter(e=>e.allocations?.length>0).length;
      const full=members.filter(m=>{
        const e=latest.entries.find(x=>x.memberId===m.id);
        const tot=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);
        return tot===100;
      }).length;
      const over=members.filter(m=>{
        const e=latest.entries.find(x=>x.memberId===m.id);
        const tot=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);
        return tot>100;
      });
      const under=members.filter(m=>{
        const e=latest.entries.find(x=>x.memberId===m.id);
        const tot=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);
        return tot>0&&tot<100;
      });
      const noInput=members.filter(m=>{
        const e=latest.entries.find(x=>x.memberId===m.id);
        const tot=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);
        return tot===0;
      });

      lines.push(`【 ${fmt(latest.weekStart)} ~ ${fmt(latest.weekEnd)} 주간 리소스 현황 분석 】\n`);
      lines.push(`① 이번 주 투입 현황 요약`);
      lines.push(`   전체 ${totalMembers}명 중 ${inputMembers}명 입력 완료 / 정상(100%) ${full}명`);
      if(noInput.length>0) lines.push(`   미입력 인원: ${noInput.map(m=>m.name).join(", ")}`);

      // ② 지난 주 대비 변경사항
      lines.push(`\n② 지난 주 대비 변경사항`);
      if(!prev){
        lines.push(`   첫 번째 입력 데이터입니다. 비교 데이터가 없습니다.`);
      } else {
        let changed=0;
        const changeDetails=[];
        members.forEach(m=>{
          const curE=latest.entries.find(e=>e.memberId===m.id);
          const preE=prev.entries.find(e=>e.memberId===m.id);
          const curAllocs=(curE?.allocations||[]).filter(a=>a.projectId&&a.rate);
          const preAllocs=(preE?.allocations||[]).filter(a=>a.projectId&&a.rate);
          const curStr=curAllocs.map(a=>`${getShort(a.projectId)}:${a.rate}%`).sort().join("|");
          const preStr=preAllocs.map(a=>`${getShort(a.projectId)}:${a.rate}%`).sort().join("|");
          if(curStr!==preStr){
            changed++;
            const curTot=curAllocs.reduce((s,a)=>s+Number(a.rate),0);
            const preTot=preAllocs.reduce((s,a)=>s+Number(a.rate),0);
            if(curTot!==preTot){
              changeDetails.push(`   • ${m.name}(${m.team}): 투입율 ${preTot}% → ${curTot}%`);
            } else {
              changeDetails.push(`   • ${m.name}(${m.team}): 프로젝트 배정 변경`);
            }
          }
        });
        if(changed===0){
          lines.push(`   지난 주와 동일한 리소스 배정입니다.`);
        } else {
          lines.push(`   총 ${changed}명의 리소스 배정이 변경되었습니다.`);
          changeDetails.forEach(d=>lines.push(d));
        }
      }

      // ③ 주의 인원
      lines.push(`\n③ 투입율 주의 인원`);
      if(over.length===0&&under.length===0){
        lines.push(`   모든 인원의 투입율이 정상(100%)입니다. ✅`);
      } else {
        over.forEach(m=>{
          const e=latest.entries.find(x=>x.memberId===m.id);
          const tot=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);
          lines.push(`   ▲ 초과: ${m.name}(${m.team}) — ${tot}%`);
        });
        under.forEach(m=>{
          const e=latest.entries.find(x=>x.memberId===m.id);
          const tot=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);
          lines.push(`   ▼ 미달: ${m.name}(${m.team}) — ${tot}%`);
        });
      }

      // ④ 특이사항
      const notes=latest.teamNotes?Object.entries(latest.teamNotes).filter(([,n])=>n?.trim()):[];
      if(notes.length>0){
        lines.push(`\n④ 팀별 특이사항`);
        notes.forEach(([team,note])=>lines.push(`   [${team}] ${note}`));
      }

      // 프로젝트별 투입 현황
      lines.push(`\n⑤ 프로젝트별 투입 현황`);
      const projMap={};
      latest.entries.forEach(e=>{
        (e.allocations||[]).forEach(a=>{
          if(!a.projectId||!a.rate)return;
          const name=getShort(a.projectId);
          if(!projMap[name])projMap[name]=0;
          projMap[name]+=Number(a.rate);
        });
      });
      const projEntries=Object.entries(projMap).sort((a,b)=>b[1]-a[1]);
      if(projEntries.length===0){
        lines.push(`   배정된 프로젝트가 없습니다.`);
      } else {
        projEntries.forEach(([name,total])=>{
          const avg=(total/totalMembers).toFixed(1);
          lines.push(`   • ${name}: 총 ${total}% (평균 ${avg}%/인)`);
        });
      }

      setAiText(lines.join("\n"));
      setAiLoading(false);
    },600);
  };

  if(!latest)return(
    <div className="text-center py-24 text-gray-400">
      <div className="text-5xl mb-3">📋</div>
      <div className="text-sm">입력된 리소스 데이터가 없습니다.<br/>리소스 및 정보 입력 메뉴에서 데이터를 입력해주세요.</div>

/* ── 리소스 입력 탭 ─────────────────────────────────────────── */
function ResourceTab({members,projects,resources,onSaveResource}){
  const [weekStart,setWeekStart]=useState(""); const [weekEnd,setWeekEnd]=useState("");
  const [selTeam,setSelTeam]=useState(""); const [entries,setEntries]=useState({});
  const [teamNote,setTeamNote]=useState(""); const [warnPopup,setWarnPopup]=useState(null);
  const [showSuccess,setShowSuccess]=useState(false); const [saving,setSaving]=useState(false);
  const teams=[...new Set(members.map(m=>m.team))];
  const teamMembers=members.filter(m=>m.team===selTeam);
  const onDateChange=(s)=>{setWeekStart(s);setWeekEnd(s?getFriday(s):"");setSelTeam("");setEntries({});setTeamNote("");};
  const onTeamChange=(team)=>{
    setSelTeam(team);
    const ex=resources.find(r=>r.weekStart===weekStart);
    const init={};
    members.filter(m=>m.team===team).forEach(m=>{
      const e=ex?.entries.find(x=>x.memberId===m.id);
      init[m.id]=e?.allocations?.length?e.allocations.map(a=>({...a})):[{projectId:"",rate:""}];
    });
    setEntries(init); setTeamNote(ex?.teamNotes?.[team]||"");
  };
  const addRow=(mid)=>setEntries(p=>({...p,[mid]:[...(p[mid]||[]),{projectId:"",rate:""}]}));
  const removeRow=(mid,i)=>setEntries(p=>({...p,[mid]:p[mid].filter((_,j)=>j!==i)}));
  const updateRow=(mid,i,f,v)=>setEntries(p=>({...p,[mid]:p[mid].map((r,j)=>j===i?{...r,[f]:v}:r)}));
  const getTotal=(mid)=>(entries[mid]||[]).reduce((s,a)=>s+(Number(a.rate)||0),0);
  const handleSave=()=>{
    if(!weekStart)return alert("주간 시작일을 선택해주세요.");
    if(!selTeam)return alert("팀을 선택해주세요.");
    const warns=teamMembers.filter(m=>getTotal(m.id)!==100).map(m=>({memberId:m.id,name:m.name,total:getTotal(m.id)}));
    if(warns.length){setWarnPopup(warns);return;}doSave();
  };
  const doSave=async()=>{
    setSaving(true);
    const newE=teamMembers.map(m=>({memberId:m.id,allocations:(entries[m.id]||[]).filter(a=>a.projectId!==""&&a.rate!=="").map(a=>({...a,projectId:Number(a.projectId)}))}));
    const tIds=teamMembers.map(m=>m.id);
    const ex=resources.find(r=>r.weekStart===weekStart);
    let newRes;
    if(ex){newRes={...ex,entries:[...ex.entries.filter(e=>!tIds.includes(e.memberId)),...newE],teamNotes:{...ex.teamNotes,[selTeam]:teamNote}};}
    else{newRes={weekStart,weekEnd,entries:newE,teamNotes:{[selTeam]:teamNote}};}
    await onSaveResource(newRes);
    setSaving(false);setWarnPopup(null);setShowSuccess(true);
  };
  const sortedProjects=(type)=>{
    const list=projects.filter(p=>p.type===type);
    if(type==="비상용")return[...list.filter(p=>p.name==="내부활동-DX본부"),...list.filter(p=>p.name!=="내부활동-DX본부")];
    return list;
  };
  return(
    <div>
      <SuccessPopup show={showSuccess} onClose={()=>setShowSuccess(false)}/>
      {warnPopup&&(
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full">
            <h3 className="font-bold text-red-600 text-lg mb-2">⚠️ 투입율 확인 필요</h3>
            <p className="text-sm text-gray-500 mb-4">아래 팀원의 투입율이 100%가 아닙니다.</p>
            {warnPopup.map(w=>(
              <div key={w.memberId} className={`flex justify-between items-center px-3 py-2 rounded-lg mb-1.5 ${w.total>100?"bg-red-50":"bg-orange-50"}`}>
                <span className="text-sm font-semibold">{w.name}</span>
                <span className={`text-sm font-bold ${w.total>100?"text-red-600":"text-orange-500"}`}>{w.total}% {w.total>100?"▲ 초과":"▼ 미달"}</span>
              </div>
            ))}
            <div className="flex gap-2 mt-5">
              <button onClick={()=>setWarnPopup(null)} className="flex-1 bg-blue-700 text-white rounded-lg py-2 text-sm hover:bg-blue-800">✏️ 수정하기</button>
              <button onClick={doSave} className="flex-1 bg-gray-100 text-gray-700 rounded-lg py-2 text-sm hover:bg-gray-200">그대로 저장</button>
            </div>
          </div>
        </div>
      )}
      <div className="bg-white rounded-lg shadow p-4 mb-4">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">📅 시작일</label>
            <input type="date" value={weekStart} onChange={e=>onDateChange(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">📅 종료일 (금요일 자동)</label>
            <input type="date" value={weekEnd} onChange={e=>setWeekEnd(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm bg-gray-50"/></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">👥 팀 선택</label>
            <select value={selTeam} onChange={e=>onTeamChange(e.target.value)} disabled={!weekStart} className="w-full border rounded-lg px-3 py-2 text-sm disabled:opacity-50">
              <option value="">팀 선택</option>
              {teams.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
        </div>
      </div>
      {selTeam&&(
        <div>
          {teamMembers.map(m=>{
            const rows=entries[m.id]||[]; const total=getTotal(m.id);
            const tc=total===100?"text-green-600":total>100?"text-red-600":"text-orange-500";
            const bg=total===100?"bg-green-50 border-green-200":total>100?"bg-red-50 border-red-200":"bg-white border-gray-200";
            return(
              <div key={m.id} className={`rounded-lg shadow border p-4 mb-3 ${bg}`}>
                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-3 gap-1">
                  <div><span className="font-bold text-gray-800">{m.name}</span><span className="text-sm text-gray-400 ml-2">{m.team} · {m.rank}</span></div>
                  <div className="flex items-center gap-2">
                    <span className={`text-sm font-bold ${tc}`}>합계 {total}%</span>
                    {total===100&&<span className="text-xs text-green-500 bg-green-100 px-2 py-0.5 rounded-full">✓ 정상</span>}
                    {total>100&&<span className="text-xs text-red-500 bg-red-100 px-2 py-0.5 rounded-full">초과</span>}
                    {total<100&&total>0&&<span className="text-xs text-orange-500 bg-orange-100 px-2 py-0.5 rounded-full">미달</span>}
                  </div>
                </div>
                {rows.map((row,i)=>(
                  <div key={i} className="flex flex-col sm:flex-row gap-2 mb-2">
                    <select value={row.projectId} onChange={e=>updateRow(m.id,i,"projectId",e.target.value)} className="flex-1 border rounded-lg px-3 py-1.5 text-sm">
                      <option value="">프로젝트 선택</option>
                      {sortedProjects("상용").length>0&&<optgroup label="── 상용">{sortedProjects("상용").map(p=><option key={p.id} value={p.id}>[{p.code}] {p.name}</option>)}</optgroup>}
                      {sortedProjects("비상용").length>0&&<optgroup label="── 비상용">{sortedProjects("비상용").map(p=><option key={p.id} value={p.id}>[{p.code}] {p.name}</option>)}</optgroup>}
                    </select>
                    <div className="flex items-center gap-1">
                      <input type="number" value={row.rate} onChange={e=>updateRow(m.id,i,"rate",e.target.value)} placeholder="0" min="0" max="200" className="w-20 border rounded-lg px-3 py-1.5 text-sm text-center"/>
                      <span className="text-sm text-gray-500">%</span>
                      <button onClick={()=>removeRow(m.id,i)} className="text-gray-300 hover:text-red-500 text-xl px-1">×</button>
                    </div>
                  </div>
                ))}
                <button onClick={()=>addRow(m.id)} className="text-blue-600 text-xs hover:underline mt-1">+ 항목 추가</button>
              </div>
            );
          })}
          <div className="bg-white rounded-lg shadow border border-yellow-200 p-4 mb-4">
            <label className="block text-sm font-semibold text-gray-700 mb-2">
              📌 {selTeam} 팀 특이사항 <span className="text-gray-400 font-normal text-xs">(없으면 현황표에 미표시)</span>
            </label>
            <textarea value={teamNote} onChange={e=>setTeamNote(e.target.value)} rows={3}
              placeholder="이번 주 특이사항을 입력하세요..."
              className="w-full border rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:border-yellow-400"/>
          </div>
          <button onClick={handleSave} disabled={saving}
            className="w-full bg-blue-800 text-white rounded-xl py-3 font-bold text-base hover:bg-blue-900 shadow-md disabled:opacity-60 flex items-center justify-center gap-2">
            {saving?<><span className="spin">⟳</span> 저장 중...</>:"💾 리소스 저장"}
          </button>
        </div>
      )}
    </div>
  );
}

/* ── 인력 탭 ────────────────────────────────────────────────── */
function MembersTab({members,onSaveMembers}){
  const [form,setForm]=useState({name:"",team:"",rank:""}); const [edit,setEdit]=useState(null);
  const [showSuccess,setShowSuccess]=useState(false); const [saving,setSaving]=useState(false);
  const save=async()=>{
    if(!form.name||!form.team||!form.rank)return alert("모든 필드를 입력해주세요.");
    setSaving(true);
    let next;
    if(edit){next=members.map(m=>m.id===edit.id?{...m,...form}:m);setEdit(null);}
    else next=[...members,{id:nid(members),...form}];
    await onSaveMembers(next);
    setForm({name:"",team:"",rank:""});setSaving(false);setShowSuccess(true);
  };
  const del=async(id)=>{if(confirm("삭제하시겠습니까?"))await onSaveMembers(members.filter(m=>m.id!==id));};
  const startEdit=(m)=>{setEdit(m);setForm({name:m.name,team:m.team,rank:m.rank});};
  return(
    <div>
      <SuccessPopup show={showSuccess} onClose={()=>setShowSuccess(false)}/>
      <div className="bg-white rounded-lg shadow p-4 mb-4">
        <div className="text-xs font-semibold text-gray-500 mb-2">{edit?"✏️ 인력 수정":"➕ 인력 추가"}</div>
        <div className="flex flex-col md:flex-row gap-2">
          {[["name","이름"],["team","소속팀"],["rank","직급"]].map(([k,pl])=>(
            <input key={k} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} placeholder={pl} className="border rounded px-3 py-1.5 text-sm flex-1"/>
          ))}
          <div className="flex gap-2">
            <button onClick={save} disabled={saving} className="bg-blue-700 text-white rounded px-4 py-1.5 text-sm hover:bg-blue-800 whitespace-nowrap disabled:opacity-60">
              {saving?"저장 중...":edit?"수정":"추가"}
            </button>
            {edit&&<button onClick={()=>{setEdit(null);setForm({name:"",team:"",rank:""});}} className="bg-gray-200 text-gray-700 rounded px-4 py-1.5 text-sm">취소</button>}
          </div>
        </div>
      </div>
      <div className="bg-white rounded-lg shadow overflow-x-auto">
        <table className="w-full text-sm">
          <thead className="bg-gray-50 border-b"><tr>{["이름","소속팀","직급","관리"].map(h=><th key={h} className="px-4 py-2.5 text-left font-semibold text-gray-600">{h}</th>)}</tr></thead>
          <tbody>
            {members.map(m=>(
              <tr key={m.id} className="border-t hover:bg-gray-50">
                <td className="px-4 py-2 font-medium">{m.name}</td>
                <td className="px-4 py-2 text-gray-500">{m.team}</td>
                <td className="px-4 py-2 text-gray-500">{m.rank}</td>
                <td className="px-4 py-2">
                  <button onClick={()=>startEdit(m)} className="text-blue-600 text-xs hover:underline mr-3">수정</button>
                  <button onClick={()=>del(m.id)} className="text-red-500 text-xs hover:underline">삭제</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── 프로젝트 탭 ─────────────────────────────────────────────── */

  };

        <div className="flex flex-col md:flex-row gap-2">
          <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})} className="border rounded px-3 py-1.5 text-sm w-28"><option value="상용">상용</option><option value="비상용">비상용</option></select>
          <input value={form.code} onChange={e=>setForm({...form,code:e.target.value})} placeholder="프로젝트 코드" className="border rounded px-3 py-1.5 text-sm w-36"/>
          <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="프로젝트명" className="border rounded px-3 py-1.5 text-sm flex-1"/>
          <div className="flex gap-2">
            <button onClick={save} disabled={saving} className="bg-blue-700 text-white rounded px-4 py-1.5 text-sm hover:bg-blue-800 whitespace-nowrap disabled:opacity-60">
              {saving?"저장 중...":edit?"수정":"추가"}
            </button>
            {edit&&<button onClick={()=>{setEdit(null);setForm({type:"상용",code:"",name:""});}} className="bg-gray-200 text-gray-700 rounded px-4 py-1.5 text-sm">취소</button>}
          </div>
        </div>
        {edit&&<p className="text-xs text-indigo-500 mt-2">💡 코드/명칭 변경 시에도 내부 ID #{edit.id}로 기존 이력과 연동 유지됩니다.</p>}
      </div>
      {[["상용",commercial,"bg-blue-100 text-blue-700"],["비상용",internal,"bg-gray-100 text-gray-600"]].map(([label,list,cls])=>(
        <div key={label} className="mb-5">
          <h3 className="text-sm font-bold text-gray-600 mb-2 flex items-center gap-1.5"><span className={`px-2 py-0.5 rounded-full text-xs ${cls}`}>{label}</span>{list.length}건</h3>
          <div className="bg-white rounded-lg shadow overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b"><tr>{["내부ID","구분","코드","프로젝트명","관리"].map(h=><th key={h} className="px-4 py-2.5 text-left font-semibold text-gray-600">{h}</th>)}</tr></thead>
              <tbody>
                {list.map(p=>(
                  <tr key={p.id} className="border-t hover:bg-gray-50">
                    <td className="px-4 py-2 text-gray-300 text-xs font-mono">#{p.id}</td>
                    <td className="px-4 py-2"><span className={`px-2 py-0.5 rounded-full text-xs ${cls}`}>{p.type}</span></td>
                    <td className="px-4 py-2 font-mono text-xs text-gray-700">{p.code}</td>
                    <td className="px-4 py-2 font-medium">{p.name}</td>
                    <td className="px-4 py-2">
                      <button onClick={()=>startEdit(p)} className="text-blue-600 text-xs hover:underline mr-3">수정</button>
                      <button onClick={()=>del(p.id)} className="text-red-500 text-xs hover:underline">삭제</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── 엑셀 내보내기 탭 ─────────────────────────────────────────── */
function ExcelTab({members,projects,resources}){
  const [expStart,setExpStart]=useState("");
  const [expEnd,setExpEnd]=useState("");
  const [exporting,setExporting]=useState(false);

  const getProj=(pid)=>projects.find(p=>p.id===pid);
  const getShort=(pid)=>{const p=getProj(pid);return p?p.name:`#${pid}`;};

  const weeks=[...resources].sort((a,b)=>a.weekStart.localeCompare(b.weekStart));

  const handleExport=()=>{
    if(!expStart||!expEnd)return alert("기간을 선택해주세요.");
    if(expStart>expEnd)return alert("시작일이 종료일보다 늦습니다.");
    setExporting(true);
    const filtered=resources.filter(r=>r.weekStart>=expStart&&r.weekStart<=expEnd)
      .sort((a,b)=>a.weekStart.localeCompare(b.weekStart));
    if(filtered.length===0){setExporting(false);return alert("해당 기간에 데이터가 없습니다.");}

    const rows=[];
    filtered.forEach(r=>{
      members.forEach(m=>{
        const entry=r.entries.find(e=>e.memberId===m.id);
        const allocs=entry?.allocations?.filter(a=>a.projectId!==""&&a.rate!=="");
        if(allocs&&allocs.length>0){
          allocs.forEach(a=>{
            const p=projects.find(x=>x.id===a.projectId);
            rows.push({
              "주차 시작":fmt(r.weekStart),"주차 종료":fmt(r.weekEnd),
              "성명":m.name,"팀":m.team,"직책":m.rank,
              "구분":p?.type||"","프로젝트 코드":p?.code||"",
              "프로젝트명":p?.name||"","투입율(%)":Number(a.rate),
            });
          });
        } else {
          rows.push({
            "주차 시작":fmt(r.weekStart),"주차 종료":fmt(r.weekEnd),
            "성명":m.name,"팀":m.team,"직책":m.rank,
            "구분":"","프로젝트 코드":"","프로젝트명":"배정없음","투입율(%)":0,
          });
        }
      });
    });

    const noteRows=[];
    filtered.forEach(r=>{
      if(r.teamNotes){
        Object.entries(r.teamNotes).filter(([,n])=>n?.trim()).forEach(([team,note])=>{
          noteRows.push({"주차 시작":fmt(r.weekStart),"주차 종료":fmt(r.weekEnd),"팀":team,"특이사항":note});
        });
      }
    });

    const wb=XLSX.utils.book_new();
    const ws1=XLSX.utils.json_to_sheet(rows);
    ws1["!cols"]=[{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:8},{wch:14},{wch:26},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws1,"투입현황");
    if(noteRows.length>0){
      const ws2=XLSX.utils.json_to_sheet(noteRows);
      ws2["!cols"]=[{wch:12},{wch:12},{wch:10},{wch:40}];
      XLSX.utils.book_append_sheet(wb,ws2,"특이사항");
    }
    XLSX.writeFile(wb,`DX_Resource_${expStart}_${expEnd}.xlsx`);
    setExporting(false);
  };

  return(
    <div>
      <div className="bg-white rounded-xl shadow p-5 mb-4">
        <h3 className="font-bold text-gray-700 text-sm mb-4">📊 기간 선택</h3>
        <div className="flex flex-col sm:flex-row gap-4 items-end mb-4">
          <div className="flex-1">
            <label className="block text-xs font-semibold text-gray-500 mb-1">시작일</label>
            <input type="date" value={expStart} onChange={e=>setExpStart(e.target.value)}
              className="w-full border rounded-lg px-3 py-2 text-sm"/>
          </div>
          <div className="flex-1">
            <label className="block text-xs font-semibold text-gray-500 mb-1">종료일</label>
            <input type="date" value={expEnd} onChange={e=>setExpEnd(e.target.value)}
              className="w-full border rounded-lg px-3 py-2 text-sm"/>
          </div>
          <button onClick={handleExport} disabled={exporting}
            className="bg-green-700 text-white px-6 py-2 rounded-lg text-sm hover:bg-green-800 disabled:opacity-50 flex items-center gap-2 whitespace-nowrap shadow font-semibold">
            {exporting?<span className="spin">⟳</span>:"📥"} 엑셀 다운로드
          </button>
        </div>
        <div className="bg-gray-50 rounded-lg p-3 text-xs text-gray-500 leading-relaxed">
          <p>• 선택 기간의 모든 주차 데이터가 <strong className="text-gray-700">투입현황</strong> / <strong className="text-gray-700">특이사항</strong> 2개 시트로 저장됩니다.</p>
          <p>• 파일명: <span className="font-mono text-gray-600">DX_Resource_시작일_종료일.xlsx</span></p>
        </div>
      </div>

      {/* 저장된 주차 목록 */}
      <div className="bg-white rounded-xl shadow p-5">
        <h3 className="font-bold text-gray-700 text-sm mb-3">📋 저장된 주차 목록 <span className="text-gray-400 font-normal">({resources.length}개)</span></h3>
        {resources.length===0
          ?<p className="text-gray-300 text-sm text-center py-8">저장된 데이터가 없습니다.</p>
          :<div className="divide-y divide-gray-100">
            {weeks.map(r=>{
              const totalEntries=r.entries.filter(e=>e.allocations?.length>0).length;
              return(
                <div key={r.weekStart} className="flex items-center justify-between py-2.5">
                  <div>
                    <span className="text-sm font-semibold text-gray-700">{fmt(r.weekStart)} ~ {fmt(r.weekEnd)}</span>
                    <span className="text-xs text-gray-400 ml-2">입력 인원 {totalEntries}명</span>
                  </div>
                  <button onClick={()=>{setExpStart(r.weekStart);setExpEnd(r.weekEnd);}}
                    className="text-xs text-blue-600 hover:underline border border-blue-200 rounded px-2 py-0.5">
                    선택
                  </button>
                </div>
              );
            })}
          </div>
        }
      </div>
    </div>
  );
}

/* ── 입력 페이지 ─────────────────────────────────────────────── */
function InputPage({members,projects,resources,onSaveMembers,onSaveProjects,onSaveResource}){
  const [tab,setTab]=useState("resource");
  const tabs=[["resource","📝 리소스입력"],["members","👤 인력"],["projects","📁 프로젝트"],["excel","📥 엑셀내보내기"]];
  return(
    <AuthGate>
      {(logout)=>(
        <div>
          <div className="flex items-center justify-between mb-4">
            <h1 className="text-xl font-bold text-gray-800">🛠️ 리소스 및 정보 입력</h1>
            <button onClick={logout} className="text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded px-3 py-1">로그아웃</button>
          </div>
          <div className="flex border-b border-gray-200 mb-4 gap-1">
            {tabs.map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} className={`px-5 py-2 text-sm font-medium border-b-2 transition-all -mb-px ${tab===k?"border-blue-600 text-blue-700":"border-transparent text-gray-500 hover:text-gray-700"}`}>{l}</button>
            ))}
          </div>
          {tab==="resource"&&<ResourceTab members={members} projects={projects} resources={resources} onSaveResource={onSaveResource}/>}
          {tab==="members"&&<MembersTab members={members} onSaveMembers={onSaveMembers}/>}
          {tab==="projects"&&<ProjectsTab projects={projects} onSaveProjects={onSaveProjects}/>}
          {tab==="excel"&&<ExcelTab members={members} projects={projects} resources={resources}/>}
        </div>
      )}
    </AuthGate>
  );
}

/* ── 앱 루트 ─────────────────────────────────────────────────── */
function App(){
  const [page,setPage]=useState("main");
  const [members,setMembers]=useState(INIT_MEMBERS);
  const [projects,setProjects]=useState(INIT_PROJECTS);
  const [resources,setResources]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{const m=await DB.getMembers(); if(m)setMembers(m);}catch(e){console.error(e);}
      try{const p=await DB.getProjects();if(p)setProjects(p);}catch(e){console.error(e);}
      try{const r=await DB.getResources();setResources(r);}catch(e){console.error(e);}
      setLoaded(true);
    })();
  },[]);

  const saveMembers=async(d)=>{setMembers(d);await DB.saveMembers(d);};
  const saveProjects=async(d)=>{setProjects(d);await DB.saveProjects(d);};
  const saveResource=async(res)=>{
    await DB.saveResource(res);
    setResources(prev=>{
      const exists=prev.find(r=>r.weekStart===res.weekStart);
      return exists?prev.map(r=>r.weekStart===res.weekStart?res:r):[...prev,res];
    });
  };

  const navItems=[["main","📊 투입현황"],["input","🛠️ 리소스 및 정보 입력"]];

  if(!loaded)return(
    <div className="flex items-center justify-center h-screen bg-gray-100">
      <div className="text-center text-gray-400">
        <div className="text-4xl spin mb-3 block">⟳</div>
        <div className="text-sm">Firebase 데이터 불러오는 중...</div>
      </div>
    </div>
  );

  return(
    <div className="min-h-screen bg-gray-100">
      <nav className="bg-blue-900 text-white shadow-lg sticky top-0 z-40">
        <div className="max-w-5xl mx-auto px-4">
          <div className="flex items-center justify-between py-3">
            <div className="font-bold text-base tracking-tight whitespace-nowrap">🏢 DX Div. Resource</div>
            <div className="hidden md:flex items-center gap-1">
              {navItems.map(([k,l])=>(
                <button key={k} onClick={()=>setPage(k)} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition ${page===k?"bg-blue-600 shadow":"hover:bg-blue-800"}`}>{l}</button>
              ))}
            </div>
            <button className="md:hidden text-xl px-1" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?"✕":"☰"}</button>
          </div>
        </div>
        {menuOpen&&(
          <div className="md:hidden border-t border-blue-800">
            {navItems.map(([k,l])=>(
              <button key={k} onClick={()=>{setPage(k);setMenuOpen(false);}} className={`block w-full text-left px-5 py-3 text-sm ${page===k?"bg-blue-700 font-semibold":"hover:bg-blue-800"}`}>{l}</button>
            ))}
          </div>
        )}
      </nav>
      <div className="max-w-5xl mx-auto px-4 py-5">
        {page==="main"&&<MainPage members={members} projects={projects} resources={resources} onReload={()=>{}}/>}
        {page==="input"&&<InputPage members={members} projects={projects} resources={resources} onSaveMembers={saveMembers} onSaveProjects={saveProjects} onSaveResource={saveResource}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
