<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DX Div. Resource</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{background:#f3f4f6;margin:0;}
  select,input,textarea{font-family:inherit;}
  @keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  .popup-enter{animation:fadeIn .2s ease;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin .8s linear infinite;display:inline-block;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const GAS="https://script.google.com/macros/s/AKfycbx3hb69nTuRt-VVRtOlCyy6dw-YeOIG4brN_ziwjeeVBgcPFRA6QLNXDzoPLPvJJZ7a/exec";
const SHEET_LINK="https://docs.google.com/spreadsheets/d/1C597_LE-jvm7fs8phNwX7-tY1a9dE8NbmOpGPuOXCPw/edit?usp=sharing";
const PIN="9943";

const INIT_MEMBERS=[
  {id:1,name:"김지훈",team:"DX본부",rank:"본부장"},
  {id:2,name:"신민정",team:"기획",rank:"팀장"},
  {id:3,name:"이예주",team:"기획",rank:"책임"},
  {id:4,name:"김지홍",team:"기획",rank:"선임"},
  {id:5,name:"권가윤",team:"PM",rank:"팀장"},
  {id:6,name:"신민섭",team:"PM",rank:"책임"},
  {id:7,name:"최상욱",team:"PM",rank:"매니저"},
  {id:8,name:"김민태",team:"시스템",rank:"매니저"},
  {id:9,name:"김영민",team:"디자인",rank:"팀장"},
  {id:10,name:"김정민",team:"디자인",rank:"선임"},
  {id:11,name:"박상언",team:"디자인",rank:"매니저"},
];
const INIT_PROJECTS=[
  {id:1,type:"상용",code:"DS25R018",name:"별내 아르떼키즈파크 구축"},
  {id:2,type:"비상용",code:"DS26N004",name:"내부활동-LG"},
  {id:3,type:"비상용",code:"DS26N004",name:"내부활동-신정호키즈랜드"},
  {id:4,type:"비상용",code:"DS26N004",name:"내부활동-신세계스퀘어"},
  {id:5,type:"비상용",code:"DS26N004",name:"내부활동-더파크사이드"},
  {id:6,type:"비상용",code:"DS26N004",name:"내부활동-고성공룡"},
  {id:7,type:"비상용",code:"DS26N004",name:"내부활동-DX본부"},
  {id:8,type:"상용",code:"DS250001",name:"롯데월드 부산 로리캐슬 운영"},
  {id:9,type:"비상용",code:"DS26N004",name:"내부활동-AI R&D"},
];

/* ── API ───────────────────────────────────────────────────── */
async function gasGet(action){
  const r=await fetch(GAS+"?action="+action,{redirect:"follow"});
  return JSON.parse(await r.text());
}
async function gasPost(payload){
  const r=await fetch(GAS,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload),
    redirect:"follow"
  });
  return JSON.parse(await r.text());
}

/* ── 유틸 ──────────────────────────────────────────────────── */
const getFriday=s=>{const d=new Date(s);d.setDate(d.getDate()+(5-d.getDay()+7)%7);return d.toISOString().split("T")[0];};
const fmt=s=>{if(!s)return"";const[y,m,d]=s.split("-");return`${y}.${m}.${d}`;};
const nid=arr=>arr.length?Math.max(...arr.map(x=>x.id))+1:1;

/* ── 공통 컴포넌트 ─────────────────────────────────────────── */
function Toast({show,onClose}){
  useEffect(()=>{if(show){const t=setTimeout(onClose,2000);return()=>clearTimeout(t);}},[show]);
  if(!show)return null;
  return(
    <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
      <div className="bg-white rounded-2xl shadow-2xl px-10 py-8 flex flex-col items-center gap-3 popup-enter">
        <div className="text-5xl">✅</div>
        <p className="font-bold text-gray-800 text-lg">입력이 완료되었습니다.</p>
        <button onClick={onClose} className="text-xs text-gray-400 border rounded-lg px-4 py-1.5">닫기</button>
      </div>
    </div>
  );
}

function AuthGate({children}){
  const [ok,setOk]=useState(false);
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  const login=()=>{if(pin===PIN){setOk(true);}else{setErr(true);setPin("");}};
  if(!ok)return(
    <div className="flex items-center justify-center py-16">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-80">
        <div className="text-center mb-6">
          <div className="text-4xl mb-2">🔐</div>
          <h2 className="font-bold text-gray-800 text-lg">접속 인증</h2>
          <p className="text-sm text-gray-400 mt-1">접속 번호를 입력해주세요</p>
        </div>
        <input type="password" value={pin} onChange={e=>setPin(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&login()} placeholder="· · · ·" maxLength={6}
          className={`w-full border-2 rounded-lg px-4 py-3 text-center text-2xl tracking-[0.5em] mb-2 outline-none ${err?"border-red-400 bg-red-50":"border-gray-200 focus:border-blue-400"}`}/>
        {err&&<p className="text-red-500 text-xs text-center mb-3">접속 번호가 올바르지 않습니다.</p>}
        <button onClick={login} className="w-full bg-blue-800 text-white rounded-lg py-2.5 font-semibold hover:bg-blue-900">접속</button>
      </div>
    </div>
  );
  return children(()=>setOk(false));
}

/* ── 메인 페이지 ───────────────────────────────────────────── */
function MainPage({members,projects,resources}){
  const [analysis,setAnalysis]=useState("");
  const [analyzing,setAnalyzing]=useState(false);

  const sorted=[...resources].sort((a,b)=>b.weekStart.localeCompare(a.weekStart));
  const latest=sorted[0],prev=sorted[1];
  const gp=pid=>projects.find(p=>p.id===Number(pid));
  const gname=pid=>{const p=gp(pid);return p?p.name:`#${pid}`;};
  const notes=latest?.teamNotes?Object.entries(latest.teamNotes).filter(([,n])=>n?.trim()):[];

  /* 인쇄 */
  const print=()=>{
    const rows=members.map(m=>{
      const e=latest.entries.find(x=>x.memberId===m.id);
      const al=(e?.allocations||[]).filter(a=>a.rate>0).sort((a,b)=>Number(b.rate)-Number(a.rate));
      const tot=al.reduce((s,a)=>s+Number(a.rate),0);
      const bc=tot===100?"#1d4ed8":tot>100?"#dc2626":"#ea580c";
      const bb=tot===100?"#eff6ff":tot>100?"#fef2f2":"#fff7ed";
      const cell=al.length===0?`<span style="color:#d1d5db;font-size:9px;">배정 내역 없음</span>`
        :al.map(a=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
          <span style="font-size:9px;color:#374151;min-width:110px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${gname(a.projectId)}</span>
          <div style="flex:1;background:#e5e7eb;border-radius:99px;height:5px;"><div style="background:#3b82f6;height:5px;border-radius:99px;width:${Math.min(Number(a.rate),100)}%;"></div></div>
          <span style="font-size:9px;font-weight:700;color:#2563eb;min-width:28px;text-align:right;">${a.rate}%</span></div>`).join("");
      return`<tr><td style="padding:5px 8px;font-weight:700;font-size:10px;border-bottom:1px solid #f1f5f9;white-space:nowrap;">${m.name}</td>
        <td style="padding:5px 8px;font-size:9px;color:#6b7280;border-bottom:1px solid #f1f5f9;">${m.team}</td>
        <td style="padding:5px 8px;font-size:9px;color:#9ca3af;border-bottom:1px solid #f1f5f9;">${m.rank}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #f1f5f9;">${cell}</td>
        <td style="padding:5px 8px;text-align:right;border-bottom:1px solid #f1f5f9;"><span style="background:${bb};color:${bc};border:1px solid ${bc}33;border-radius:99px;padding:2px 8px;font-size:9px;font-weight:700;">${tot}%</span></td></tr>`;
    }).join("");
    const noteHtml=notes.length?`<div style="margin-top:10px;padding:8px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;"><div style="font-weight:700;font-size:9px;color:#92400e;margin-bottom:6px;">📌 팀별 특이사항</div><div style="display:flex;flex-wrap:wrap;gap:8px;">${notes.map(([t,n])=>`<div><span style="font-weight:600;font-size:9px;color:#1e3a5f;">${t} 팀</span><div style="font-size:9px;color:#374151;margin-top:1px;">${n}</div></div>`).join("")}</div></div>`:"";
    const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>DX Div. Resource</title>
      <style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,'Malgun Gothic',sans-serif;padding:10mm;}
      h2{font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:2px;}.p{font-size:9px;color:#6b7280;margin-bottom:8px;}
      table{width:100%;border-collapse:collapse;}thead tr{background:#1e3a5f;}thead th{color:#fff;font-size:9px;font-weight:600;padding:5px 8px;text-align:left;}
      thead th:last-child{text-align:right;}tbody tr:nth-child(even){background:#f8fafc;}
      @media print{@page{margin:0;size:A4 portrait;}body{padding:10mm;}}</style></head>
      <body><h2>🏢 DX Div. Resource 주간 투입현황</h2>
      <div class="p">📅 ${fmt(latest.weekStart)} ~ ${fmt(latest.weekEnd)} &nbsp;|&nbsp; 출력일: ${new Date().toLocaleDateString("ko-KR")}</div>
      <table><thead><tr><th style="width:48px;">성명</th><th style="width:44px;">팀</th><th style="width:40px;">직책</th><th>투입 프로젝트 (투입률 높은 순)</th><th style="width:44px;">투입율</th></tr></thead>
      <tbody>${rows}</tbody></table>${noteHtml}
      <script>setTimeout(function(){window.print();},400);<\/script></body></html>`;
    const w=window.open("","_blank","width=900,height=1100");
    w.document.open();w.document.write(html);w.document.close();
  };

  /* 분석 */
  const analyze=()=>{
    if(!latest)return;
    setAnalyzing(true);setAnalysis("");
    setTimeout(()=>{
      const N=members.length;
      const full=members.filter(m=>{const e=latest.entries.find(x=>x.memberId===m.id);const t=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);return t===100;}).length;
      const over=members.filter(m=>{const e=latest.entries.find(x=>x.memberId===m.id);const t=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);return t>100;});
      const under=members.filter(m=>{const e=latest.entries.find(x=>x.memberId===m.id);const t=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);return t>0&&t<100;});
      const none=members.filter(m=>{const e=latest.entries.find(x=>x.memberId===m.id);const t=(e?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);return t===0;});
      const lines=[];
      lines.push(`【 ${fmt(latest.weekStart)} ~ ${fmt(latest.weekEnd)} 주간 분석 】\n`);
      lines.push(`① 이번 주 요약`);
      lines.push(`   전체 ${N}명 / 정상(100%) ${full}명 / 초과 ${over.length}명 / 미달 ${under.length}명`);
      if(none.length)lines.push(`   미입력: ${none.map(m=>m.name).join(", ")}`);
      lines.push(`\n② 지난 주 대비 변경`);
      if(!prev){lines.push("   첫 입력 데이터 — 비교 없음");}
      else{
        let cnt=0,details=[];
        members.forEach(m=>{
          const ce=latest.entries.find(x=>x.memberId===m.id);
          const pe=prev.entries.find(x=>x.memberId===m.id);
          const cs=(ce?.allocations||[]).map(a=>`${gname(a.projectId)}:${a.rate}`).sort().join("|");
          const ps=(pe?.allocations||[]).map(a=>`${gname(a.projectId)}:${a.rate}`).sort().join("|");
          if(cs!==ps){cnt++;const ct=(ce?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);const pt=(pe?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);details.push(`   • ${m.name}(${m.team}): ${pt}% → ${ct}%`);}
        });
        if(cnt===0)lines.push("   변경 없음");
        else{lines.push(`   ${cnt}명 변경`);details.forEach(d=>lines.push(d));}
      }
      lines.push(`\n③ 주의 인원`);
      if(!over.length&&!under.length){lines.push("   전원 정상 ✅");}
      else{
        over.forEach(m=>{const t=(latest.entries.find(x=>x.memberId===m.id)?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);lines.push(`   ▲ 초과: ${m.name}(${m.team}) ${t}%`);});
        under.forEach(m=>{const t=(latest.entries.find(x=>x.memberId===m.id)?.allocations||[]).reduce((s,a)=>s+Number(a.rate),0);lines.push(`   ▼ 미달: ${m.name}(${m.team}) ${t}%`);});
      }
      if(notes.length){lines.push(`\n④ 특이사항`);notes.forEach(([t,n])=>lines.push(`   [${t}] ${n}`));}
      lines.push(`\n⑤ 프로젝트별 현황`);
      const pm={};
      latest.entries.forEach(e=>(e.allocations||[]).forEach(a=>{if(!a.projectId||!a.rate)return;const n=gname(a.projectId);pm[n]=(pm[n]||0)+Number(a.rate);}));
      const pe=Object.entries(pm).sort((a,b)=>b[1]-a[1]);
      if(!pe.length)lines.push("   배정 없음");
      else pe.forEach(([n,t])=>lines.push(`   • ${n}: 총 ${t}% (평균 ${(t/N).toFixed(1)}%)`));
      setAnalysis(lines.join("\n"));setAnalyzing(false);
    },400);
  };

  if(!latest)return(
    <div className="text-center py-24 text-gray-400">
      <div className="text-5xl mb-3">📋</div>
      <p className="text-sm">입력된 데이터가 없습니다.<br/>리소스 및 정보 입력 메뉴에서 데이터를 입력해주세요.</p>
    </div>
  );

  return(
    <div>
      <div className="flex flex-col sm:flex-row sm:items-start justify-between mb-4 gap-3">
        <div>
          <h1 className="text-xl font-bold text-gray-800">📊 주간 투입현황</h1>
          <p className="text-sm text-gray-500 mt-0.5">📅 {fmt(latest.weekStart)} ~ {fmt(latest.weekEnd)}</p>
        </div>
        <button onClick={print} className="self-start ml-auto bg-blue-800 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-900 flex items-center gap-1.5 shadow whitespace-nowrap">🖨️ 인쇄 / PDF 저장</button>
      </div>

      {/* 데스크탑 */}
      <div className="hidden md:block">
        <div className="bg-blue-900 text-white rounded-t-xl px-6 py-2.5 grid grid-cols-12 gap-2 text-xs font-semibold">
          <div className="col-span-2">성명</div><div className="col-span-2">팀</div><div className="col-span-1">직책</div>
          <div className="col-span-6">투입 프로젝트 (투입률 높은 순)</div><div className="col-span-1 text-right">투입율</div>
        </div>
        <div className="bg-white rounded-b-xl shadow divide-y divide-gray-100 mb-4">
          {members.map(m=>{
            const e=latest.entries.find(x=>x.memberId===m.id);
            const al=(e?.allocations||[]).filter(a=>a.rate>0).sort((a,b)=>Number(b.rate)-Number(a.rate));
            const tot=al.reduce((s,a)=>s+Number(a.rate),0);
            const cls=tot===100?"bg-blue-100 text-blue-700 border-blue-200":tot>100?"bg-red-100 text-red-600 border-red-200":tot>0?"bg-orange-100 text-orange-600 border-orange-200":"bg-gray-100 text-gray-400 border-gray-200";
            return(
              <div key={m.id} className="grid grid-cols-12 gap-2 items-center px-6 py-4 hover:bg-blue-50">
                <div className="col-span-2 font-bold text-sm">{m.name}</div>
                <div className="col-span-2 text-gray-500 text-sm">{m.team}</div>
                <div className="col-span-1 text-gray-400 text-xs">{m.rank}</div>
                <div className="col-span-6">
                  {al.length===0?<span className="text-gray-300 text-xs">배정 내역 없음</span>:al.map((a,i)=>(
                    <div key={i} className="mb-2 last:mb-0">
                      <div className="flex justify-between mb-0.5">
                        <span className="text-xs text-gray-600 truncate max-w-xs">{gname(a.projectId)}</span>
                        <span className="text-xs font-bold text-blue-600 ml-2">{a.rate}%</span>
                      </div>
                      <div className="w-full bg-gray-100 rounded-full h-2">
                        <div className="h-2 rounded-full bg-blue-500" style={{width:`${Math.min(Number(a.rate),100)}%`}}/>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="col-span-1 flex justify-end">
                  <span className={`text-xs font-bold px-3 py-1.5 rounded-full border ${cls}`}>{tot}%</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 모바일 */}
      <div className="md:hidden bg-white rounded-xl shadow divide-y divide-gray-100 mb-4">
        {members.map(m=>{
          const e=latest.entries.find(x=>x.memberId===m.id);
          const al=(e?.allocations||[]).filter(a=>a.rate>0).sort((a,b)=>Number(b.rate)-Number(a.rate));
          const tot=al.reduce((s,a)=>s+Number(a.rate),0);
          const cls=tot===100?"bg-blue-100 text-blue-700 border-blue-200":tot>100?"bg-red-100 text-red-600 border-red-200":tot>0?"bg-orange-100 text-orange-600 border-orange-200":"bg-gray-100 text-gray-400 border-gray-200";
          return(
            <div key={m.id} className="px-4 py-3">
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2">
                  <span className="font-bold text-sm">{m.name}</span>
                  <span className="text-xs text-gray-400">{m.team}</span>
                  <span className="text-xs text-gray-300">{m.rank}</span>
                </div>
                <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${cls}`}>{tot}%</span>
              </div>
              {al.length===0?<span className="text-gray-300 text-xs">배정 내역 없음</span>:al.map((a,i)=>(
                <div key={i} className="mb-2 last:mb-0 pl-1">
                  <div className="flex justify-between mb-1">
                    <span className="text-xs text-gray-600 truncate" style={{maxWidth:"75%"}}>{gname(a.projectId)}</span>
                    <span className="text-xs font-bold text-blue-600 ml-1">{a.rate}%</span>
                  </div>
                  <div className="w-full bg-gray-100 rounded-full h-1.5">
                    <div className="h-1.5 rounded-full bg-blue-500" style={{width:`${Math.min(Number(a.rate),100)}%`}}/>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </div>

      <div className="flex gap-4 text-xs text-gray-400 mb-4">
        {[["bg-blue-500","100% 정상"],["bg-red-400","초과"],["bg-orange-400","미달"]].map(([c,l])=>(
          <span key={l}><span className={`inline-block w-2.5 h-2.5 rounded-full ${c} mr-1`}></span>{l}</span>
        ))}
      </div>

      {notes.length>0&&(
        <div className="mb-4">
          <h3 className="font-bold text-gray-700 text-sm mb-2">📌 팀별 특이사항</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {notes.map(([t,n])=>(
              <div key={t} className="bg-yellow-50 border border-yellow-200 rounded-lg px-4 py-3">
                <div className="font-semibold text-yellow-800 text-xs mb-1">{t} 팀</div>
                <div className="text-sm text-gray-700 whitespace-pre-wrap">{n}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="bg-white rounded-xl shadow p-4">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-bold text-gray-700 text-sm">📋 현황 분석</h3>
          <button onClick={analyze} disabled={analyzing}
            className="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-xs hover:bg-indigo-700 disabled:opacity-50 flex items-center gap-1">
            {analyzing?<><span className="spin">⟳</span> 분석 중...</>:"분석 실행"}
          </button>
        </div>
        {analysis
          ?<div className="text-xs text-gray-700 leading-relaxed bg-indigo-50 rounded-lg p-3 whitespace-pre-wrap font-mono">{analysis}</div>
          :<p className="text-xs text-gray-400">버튼을 클릭하면 이번 주 투입 현황을 분석합니다.</p>
        }
      </div>
    </div>
  );
}

/* ── 리소스 입력 ───────────────────────────────────────────── */
function ResourceTab({members,projects,resources,onSave}){
  const [wS,setWS]=useState(""),  [wE,setWE]=useState("");
  const [team,setTeam]=useState(""), [ent,setEnt]=useState({});
  const [note,setNote]=useState(""), [warn,setWarn]=useState(null);
  const [toast,setToast]=useState(false), [saving,setSaving]=useState(false);

  const teams=[...new Set(members.map(m=>m.team))];
  const teamM=members.filter(m=>m.team===team);
  const onDate=s=>{setWS(s);setWE(s?getFriday(s):"");setTeam("");setEnt({});setNote("");};
  const onTeam=t=>{
    setTeam(t);
    const ex=resources.find(r=>r.weekStart===wS);
    const init={};
    members.filter(m=>m.team===t).forEach(m=>{
      const e=ex?.entries?.find(x=>x.memberId===m.id);
      init[m.id]=e?.allocations?.length?e.allocations.map(a=>({...a})):[{projectId:"",rate:""}];
    });
    setEnt(init);
    setNote(ex?.teamNotes?.[t]||"");
  };
  const addRow=mid=>setEnt(p=>({...p,[mid]:[...(p[mid]||[]),{projectId:"",rate:""}]}));
  const delRow=(mid,i)=>setEnt(p=>({...p,[mid]:p[mid].filter((_,j)=>j!==i)}));
  const upd=(mid,i,f,v)=>setEnt(p=>({...p,[mid]:p[mid].map((r,j)=>j===i?{...r,[f]:v}:r)}));
  const tot=mid=>(ent[mid]||[]).reduce((s,a)=>s+(Number(a.rate)||0),0);

  const save=()=>{
    if(!wS)return alert("시작일을 선택해주세요.");
    if(!team)return alert("팀을 선택해주세요.");
    const w=teamM.filter(m=>tot(m.id)!==100).map(m=>({memberId:m.id,name:m.name,total:tot(m.id)}));
    if(w.length){setWarn(w);return;}
    doSave();
  };
  const doSave=async()=>{
    setSaving(true);
    const newE=teamM.map(m=>({memberId:m.id,allocations:(ent[m.id]||[]).filter(a=>a.projectId!==""&&a.rate!=="").map(a=>({...a,projectId:Number(a.projectId)}))}));
    const tIds=teamM.map(m=>m.id);
    const ex=resources.find(r=>r.weekStart===wS);
    let res;
    if(ex){const tn={...ex.teamNotes||{}}; tn[team]=note; res={...ex,entries:[...ex.entries.filter(e=>!tIds.includes(e.memberId)),...newE],teamNotes:tn};}
    else{const tn={}; tn[team]=note; res={weekStart:wS,weekEnd:wE,entries:newE,teamNotes:tn};}
    try{await onSave(res);setWarn(null);setToast(true);}
    catch(e){alert("저장 오류: "+e.message);}
    setSaving(false);
  };

  const spj=type=>{const l=projects.filter(p=>p.type===type);if(type==="비상용")return[...l.filter(p=>p.name==="내부활동-DX본부"),...l.filter(p=>p.name!=="내부활동-DX본부")];return l;};

  return(
    <div>
      <Toast show={toast} onClose={()=>setToast(false)}/>
      {warn&&(
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full">
            <h3 className="font-bold text-red-600 text-lg mb-2">⚠️ 투입율 확인 필요</h3>
            <p className="text-sm text-gray-500 mb-4">아래 팀원의 투입율이 100%가 아닙니다.</p>
            {warn.map(w=>(
              <div key={w.memberId} className={`flex justify-between px-3 py-2 rounded-lg mb-1.5 ${w.total>100?"bg-red-50":"bg-orange-50"}`}>
                <span className="text-sm font-semibold">{w.name}</span>
                <span className={`text-sm font-bold ${w.total>100?"text-red-600":"text-orange-500"}`}>{w.total}% {w.total>100?"▲":"▼"}</span>
              </div>
            ))}
            <div className="flex gap-2 mt-5">
              <button onClick={()=>setWarn(null)} className="flex-1 bg-blue-700 text-white rounded-lg py-2 text-sm">✏️ 수정</button>
              <button onClick={doSave} className="flex-1 bg-gray-100 text-gray-700 rounded-lg py-2 text-sm">그대로 저장</button>
            </div>
          </div>
        </div>
      )}
      <div className="bg-white rounded-lg shadow p-4 mb-4">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">📅 시작일</label>
            <input type="date" value={wS} onChange={e=>onDate(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm"/></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">📅 종료일 (금요일 자동)</label>
            <input type="date" value={wE} onChange={e=>setWE(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm bg-gray-50"/></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">👥 팀 선택</label>
            <select value={team} onChange={e=>onTeam(e.target.value)} disabled={!wS} className="w-full border rounded-lg px-3 py-2 text-sm disabled:opacity-50">
              <option value="">팀 선택</option>
              {teams.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
        </div>
      </div>
      {team&&(
        <div>
          {teamM.map(m=>{
            const rows=ent[m.id]||[], t=tot(m.id);
            const tc=t===100?"text-green-600":t>100?"text-red-600":"text-orange-500";
            const bg=t===100?"bg-green-50 border-green-200":t>100?"bg-red-50 border-red-200":"bg-white border-gray-200";
            return(
              <div key={m.id} className={`rounded-lg shadow border p-4 mb-3 ${bg}`}>
                <div className="flex justify-between items-center mb-3">
                  <div><span className="font-bold">{m.name}</span><span className="text-sm text-gray-400 ml-2">{m.team} · {m.rank}</span></div>
                  <div className="flex items-center gap-2">
                    <span className={`text-sm font-bold ${tc}`}>합계 {t}%</span>
                    {t===100&&<span className="text-xs text-green-500 bg-green-100 px-2 py-0.5 rounded-full">✓</span>}
                    {t>100&&<span className="text-xs text-red-500 bg-red-100 px-2 py-0.5 rounded-full">초과</span>}
                    {t>0&&t<100&&<span className="text-xs text-orange-500 bg-orange-100 px-2 py-0.5 rounded-full">미달</span>}
                  </div>
                </div>
                {rows.map((row,i)=>(
                  <div key={i} className="flex flex-col sm:flex-row gap-2 mb-2">
                    <select value={row.projectId} onChange={e=>upd(m.id,i,"projectId",e.target.value)} className="flex-1 border rounded-lg px-3 py-1.5 text-sm">
                      <option value="">프로젝트 선택</option>
                      {spj("상용").length>0&&<optgroup label="── 상용">{spj("상용").map(p=><option key={p.id} value={p.id}>[{p.code}] {p.name}</option>)}</optgroup>}
                      {spj("비상용").length>0&&<optgroup label="── 비상용">{spj("비상용").map(p=><option key={p.id} value={p.id}>[{p.code}] {p.name}</option>)}</optgroup>}
                    </select>
                    <div className="flex items-center gap-1">
                      <input type="number" value={row.rate} onChange={e=>upd(m.id,i,"rate",e.target.value)} placeholder="0" min="0" max="200" className="w-20 border rounded-lg px-3 py-1.5 text-sm text-center"/>
                      <span className="text-sm text-gray-500">%</span>
                      <button onClick={()=>delRow(m.id,i)} className="text-gray-300 hover:text-red-500 text-xl px-1">×</button>
                    </div>
                  </div>
                ))}
                <button onClick={()=>addRow(m.id)} className="text-blue-600 text-xs hover:underline mt-1">+ 항목 추가</button>
              </div>
            );
          })}
          <div className="bg-white rounded-lg shadow border border-yellow-200 p-4 mb-4">
            <label className="block text-sm font-semibold text-gray-700 mb-2">📌 {team} 팀 특이사항 <span className="text-gray-400 font-normal text-xs">(없으면 현황표에 미표시)</span></label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3} placeholder="이번 주 특이사항을 입력하세요..."
              className="w-full border rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:border-yellow-400"/>
          </div>
          <button onClick={save} disabled={saving}
            className="w-full bg-blue-800 text-white rounded-xl py-3 font-bold text-base hover:bg-blue-900 shadow-md disabled:opacity-60 flex items-center justify-center gap-2">
            {saving?<><span className="spin">⟳</span> 저장 중...</>:"💾 리소스 저장"}
          </button>
        </div>
      )}
    </div>
  );
}

/* ── 인력 탭 ─────────────────────────────────────────────────── */

    if(!form.name||!form.team||!form.rank)return alert("모든 필드를 입력해주세요.");

            <button onClick={save} disabled={saving} className="bg-blue-700 text-white rounded px-4 py-1.5 text-sm hover:bg-blue-800 whitespace-nowrap disabled:opacity-60">{saving?"저장 중...":edit?"수정":"추가"}</button>

          </div>
        </div>
      </div>
      <div className="bg-white rounded-lg shadow overflow-x-auto">

              <tr key={m.id} className="border-t hover:bg-gray-50">

                <td className="px-4 py-2 text-gray-500">{m.team}</td>

                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── 앱 루트 ─────────────────────────────────────────────────── */
function App(){
  const [page,setPage]=useState("main");
  const [members,setMembers]=useState(INIT_MEMBERS);
  const [projects,setProjects]=useState(INIT_PROJECTS);
  const [resources,setResources]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [connErr,setConnErr]=useState(false);
  const [connected,setConnected]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const [cfg,res]=await Promise.all([gasGet("getConfig"),gasGet("getResources")]);
        if(cfg.ok){
          if(cfg.data?.members)setMembers(cfg.data.members);
          if(cfg.data?.projects)setProjects(cfg.data.projects);
          setConnected(true);
        }
        if(res.ok)setResources(res.data||[]);
      }catch(e){
        console.error(e);setConnErr(true);
      }
      setLoaded(true);
    })();
  },[]);

  const saveMembers=async d=>{setMembers(d);await gasPost({action:"saveConfig",key:"members",data:d});};
  const saveProjects=async d=>{setProjects(d);await gasPost({action:"saveConfig",key:"projects",data:d});};
  const saveResource=async res=>{
    await gasPost({action:"saveResource",data:res,members,projects});
    setResources(prev=>{
      const ex=prev.find(r=>r.weekStart===res.weekStart);
      return ex?prev.map(r=>r.weekStart===res.weekStart?res:r):[...prev,res];
    });
  };

  const NAV=[["main","📊 투입현황"],["input","🛠️ 리소스 및 정보 입력"]];

  if(!loaded)return(
    <div className="flex items-center justify-center h-screen bg-gray-100">
      <div className="text-center text-gray-400">
        <div className="text-4xl spin mb-3">⟳</div>
        <p className="text-sm">데이터 불러오는 중...</p>
      </div>
    </div>
  );

  if(connErr)return(
    <div className="flex items-center justify-center h-screen bg-gray-100">
      <div className="bg-white rounded-xl shadow p-8 text-center">
        <div className="text-4xl mb-3">⚠️</div>
        <p className="font-bold text-gray-700 mb-2">서버 연결 오류</p>
        <p className="text-sm text-gray-400 mb-4">Google Apps Script 연결을 확인해주세요.</p>
        <button onClick={()=>window.location.reload()} className="bg-blue-700 text-white px-4 py-2 rounded-lg text-sm">다시 시도</button>
      </div>
    </div>
  );

  return(
    <div className="min-h-screen bg-gray-100">
      <nav className="bg-blue-900 text-white shadow-lg sticky top-0 z-40">
        <div className="max-w-5xl mx-auto px-4">
          <div className="flex items-center justify-between py-3">
            <div className="font-bold text-base whitespace-nowrap">🏢 DX Div. Resource</div>
            <div className="hidden md:flex items-center gap-2">
              {connected&&(
                <a href={SHEET_LINK} target="_blank" rel="noopener noreferrer"
                  className="flex items-center gap-1.5 bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1.5 rounded-lg transition whitespace-nowrap">
                  <span className="w-2 h-2 rounded-full bg-green-300 animate-pulse inline-block"></span>
                  구글 시트 연동됨
                </a>
              )}
              <div className="flex items-center gap-1">
                {NAV.map(([k,l])=>(
                  <button key={k} onClick={()=>setPage(k)} className={"px-4 py-1.5 rounded-lg text-sm font-medium transition "+(page===k?"bg-blue-600 shadow":"hover:bg-blue-800")}>{l}</button>
                ))}
              </div>
            </div>
            <button className="md:hidden text-xl px-1" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?"✕":"☰"}</button>
          </div>
        </div>
        {menuOpen&&(
          <div className="md:hidden border-t border-blue-800">
            {NAV.map(([k,l])=>(
              <button key={k} onClick={()=>{setPage(k);setMenuOpen(false);}} className={"block w-full text-left px-5 py-3 text-sm "+(page===k?"bg-blue-700 font-semibold":"hover:bg-blue-800")}>{l}</button>
            ))}
            {connected&&<a href={SHEET_LINK} target="_blank" rel="noopener noreferrer" className="block w-full text-left px-5 py-3 text-sm text-green-300 hover:bg-blue-800">📋 구글 시트 열기</a>}
          </div>
        )}
      </nav>
      <div className="max-w-5xl mx-auto px-4 py-5">
        {page==="main"&&<MainPage members={members} projects={projects} resources={resources}/>}
        {page==="input"&&<InputPage members={members} projects={projects} resources={resources} onSaveMembers={saveMembers} onSaveProjects={saveProjects} onSaveResource={saveResource}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
